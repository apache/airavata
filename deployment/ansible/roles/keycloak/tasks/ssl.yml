---
- name: Set web server config directory
  ansible.builtin.set_fact:
    vhost_config_directory: "{{ vhost_config_dir[ansible_os_family] }}"

- name: Check if SSL certificate exists
  ansible.builtin.stat:
    path: "{{ keycloak_ssl_certificate_file }}"
  register: stat_ssl_cert_result
  become: true

- name: Generate certificate if it doesn't exist
  ansible.builtin.command: "certbot --apache --non-interactive --agree-tos --email {{ letsencrypt_email }} -d {{ keycloak_vhost_servername }} certonly"
  become: true
  when: not stat_ssl_cert_result.stat.exists

- name: Add Keycloak virtual host config
  ansible.builtin.template:
    src: vhost.conf.j2
    dest: "{{ vhost_config_directory }}/keycloak.conf"
    backup: true
  become: true
  notify:
    - restart httpd
    - restart apache2

- name: Enable Keycloak site (Debian)
  ansible.builtin.command: /usr/sbin/a2ensite keycloak.conf
  become: true
  when: ansible_os_family == "Debian"
