---
temporal_version: "1.1.1"
temporal_download_url: "https://github.com/temporalio/cli/releases/download/v{{ temporal_version }}/temporal_cli_{{ temporal_version }}_linux_amd64.tar.gz"
temporal_install_dir: "/opt/temporal"
temporal_binary_path: "{{ temporal_install_dir }}/temporal"

temporal_port: 7233
temporal_ui_port: 8233
temporal_metrics_port: 9233

temporal_db_filename: "{{ temporal_install_dir }}/temporal.db"
temporal_namespace: "default"
temporal_log_level: "warn"

temporal_systemd_unit_file: "/etc/systemd/system/temporal.service"
