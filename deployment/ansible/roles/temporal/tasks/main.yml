---
- name: Create Temporal install directory
  ansible.builtin.file:
    path: "{{ temporal_install_dir }}"
    state: directory
    owner: "{{ user }}"
    group: "{{ group }}"
    mode: "0755"
  become: true

- name: Check if Temporal binary is already installed
  ansible.builtin.stat:
    path: "{{ temporal_binary_path }}"
  register: temporal_binary_stat

- name: Check installed Temporal version
  ansible.builtin.command: "{{ temporal_binary_path }} --version"
  register: temporal_installed_version
  failed_when: false
  changed_when: false
  when: temporal_binary_stat.stat.exists

- name: Download Temporal CLI archive
  ansible.builtin.get_url:
    url: "{{ temporal_download_url }}"
    dest: "/tmp/temporal_cli_{{ temporal_version }}_linux_amd64.tar.gz"
    mode: "0644"
  when: >
    not temporal_binary_stat.stat.exists or
    temporal_version not in (temporal_installed_version.stdout | default(''))
  become: true

- name: Extract Temporal CLI binary
  ansible.builtin.unarchive:
    src: "/tmp/temporal_cli_{{ temporal_version }}_linux_amd64.tar.gz"
    dest: "{{ temporal_install_dir }}"
    remote_src: true
    owner: "{{ user }}"
    group: "{{ group }}"
    mode: "0755"
  when: >
    not temporal_binary_stat.stat.exists or
    temporal_version not in (temporal_installed_version.stdout | default(''))
  become: true
  notify: restart temporal

- name: Ensure Temporal binary is executable
  ansible.builtin.file:
    path: "{{ temporal_binary_path }}"
    owner: "{{ user }}"
    group: "{{ group }}"
    mode: "0755"
  become: true

- name: Create Temporal database directory
  ansible.builtin.file:
    path: "{{ temporal_db_filename | dirname }}"
    state: directory
    owner: "{{ user }}"
    group: "{{ group }}"
    mode: "0755"
  become: true

- name: Install Temporal systemd service unit
  ansible.builtin.template:
    src: temporal.service.j2
    dest: "{{ temporal_systemd_unit_file }}"
    owner: root
    group: root
    mode: "0644"
  become: true
  notify: restart temporal

- name: Start and enable Temporal service
  ansible.builtin.systemd:
    name: temporal
    state: started
    enabled: true
    daemon_reload: yes
  become: true

- name: Allow Temporal frontend port through firewall (RedHat)
  ansible.posix.firewalld:
    port: "{{ temporal_port }}/tcp"
    zone: public
    permanent: yes
    state: enabled
    immediate: yes
  become: true
  when: ansible_os_family == "RedHat"

- name: Allow Temporal UI port through firewall (RedHat)
  ansible.posix.firewalld:
    port: "{{ temporal_ui_port }}/tcp"
    zone: public
    permanent: yes
    state: enabled
    immediate: yes
  become: true
  when: ansible_os_family == "RedHat"

- name: Allow Temporal frontend port through firewall (Debian)
  community.general.ufw:
    rule: allow
    port: "{{ temporal_port }}"
    proto: tcp
  become: true
  when: ansible_os_family == "Debian"

- name: Allow Temporal UI port through firewall (Debian)
  community.general.ufw:
    rule: allow
    port: "{{ temporal_ui_port }}"
    proto: tcp
  become: true
  when: ansible_os_family == "Debian"
