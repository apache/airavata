---
- name: Create databases
  community.mysql.mysql_db:
    name: "{{ item }}"
    state: present
    encoding: utf8
  loop: "{{ mysql_databases }}"

- name: Give access to {{ db_user }} from remote
  community.mysql.mysql_user:
    name: "{{ db_user }}"
    password: "{{ db_password }}"
    host: "{{ hostvars[item]['ansible_default_ipv4']['address'] | default(hostvars[item]['ansible_host'] | default(item)) }}"
  loop: "{{ groups['apiserver'] }}"

- name: Give access to {{ db_user }} from localhost
  community.mysql.mysql_user:
    name: "{{ db_user }}"
    password: "{{ db_password }}"
    host: localhost

- name: Create user {{ db_user }} with all privileges
  community.mysql.mysql_user:
    name: "{{ db_user }}"
    password: "{{ db_password }}"
    append_privs: yes
    host_all: yes
    priv: "*.*:ALL,GRANT"
    state: present

- name: Create keycloak database
  community.mysql.mysql_db:
    name: keycloak
    state: present
    encoding: utf8
  when: "'keycloak' in groups"

- name: Give access to {{ keycloak_db_username }} from remote
  community.mysql.mysql_user:
    name: "{{ keycloak_db_username }}"
    password: "{{ keycloak_db_password }}"
    host: "{{ hostvars[item]['ansible_default_ipv4']['address'] | default(hostvars[item]['ansible_host'] | default(hostvars[item].public_ipv4 | default(item))) }}"
  loop: "{{ groups['keycloak'] }}"
  when: "'keycloak' in groups"

- name: Create user {{ keycloak_db_username }} with all privileges
  community.mysql.mysql_user:
    name: "{{ keycloak_db_username }}"
    password: "{{ keycloak_db_password }}"
    append_privs: yes
    host_all: yes
    priv: "keycloak.*:ALL,GRANT"
    state: present
  when: "'keycloak' in groups"
