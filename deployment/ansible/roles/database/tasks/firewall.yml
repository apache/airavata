---
- name: Allow only selected networks to access DB (RedHat)
  ansible.posix.firewalld:
    zone: public
    permanent: yes
    state: enabled
    immediate: yes
    rich_rule: rule family=ipv4 source address="{{ item }}" port port="{{ db_server_port }}" protocol=tcp accept
  loop: "{{ db_subnets }}"
  become: true
  when: ansible_os_family == "RedHat" and db_subnets | length > 0

- name: Allow only selected networks to access DB (Debian)
  community.general.ufw:
    rule: allow
    from: "{{ item }}"
    port: "{{ db_server_port }}"
    proto: tcp
  loop: "{{ db_subnets }}"
  become: true
  when: ansible_os_family == "Debian" and db_subnets | length > 0
