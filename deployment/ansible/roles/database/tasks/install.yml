---
- name: Install EPEL release (RedHat)
  ansible.builtin.package:
    name: epel-release
    state: present
  become: true
  when: ansible_os_family == "RedHat"

- name: Install pip (CentOS)
  ansible.builtin.yum:
    name: python-pip
    state: latest
    update_cache: yes
  become: true
  when: ansible_distribution == "CentOS"

- name: Install pip (Rocky)
  ansible.builtin.dnf:
    name: python39-pip
    state: present
  become: true
  when: ansible_distribution == "Rocky"

- name: Install pip (Debian)
  ansible.builtin.apt:
    name: python3-pip
    state: present
    update_cache: yes
  become: true
  when: ansible_os_family == "Debian"

- name: Install pexpect
  ansible.builtin.pip:
    name: pexpect
  become: true

- name: Install Python MySQL support
  ansible.builtin.package:
    name: "{{ mysql_python_packages[ansible_distribution] | default(mysql_python_packages['Debian']) }}"
    state: present
  become: true
  when: ansible_os_family == "Debian" or ansible_distribution in ["CentOS", "Rocky"]

- name: Add MariaDB yum repository on CentOS
  ansible.builtin.copy:
    src: "files/MariaDB_yum_CentOS_{{ ansible_distribution_major_version }}.repo"
    dest: /etc/yum.repos.d/
  become: true
  when: ansible_distribution == "CentOS"

- name: Install MariaDB
  ansible.builtin.package:
    name: "{{ item }}"
    state: "{{ 'latest' if ansible_distribution == 'CentOS' or ansible_os_family == 'Debian' else 'present' }}"
    update_cache: "{{ ansible_os_family == 'Debian' or ansible_distribution == 'CentOS' }}"
  loop: "{{ mysql_packages[ansible_distribution] | default(mysql_packages['Debian']) }}"
  become: true

- name: Check if MySQL SELinux policy exists
  ansible.builtin.stat:
    path: /usr/share/mysql/SELinux/mariadb.pp
  register: mysql_selinux_update

- name: Install policycoreutils (RedHat)
  ansible.builtin.package:
    name: "{{ policycoreutils_packages[ansible_distribution] }}"
    state: installed
  become: true
  when: ansible_os_family == "RedHat" and not mysql_selinux_update.stat.exists

- name: Copy SELinux type enforcement file
  ansible.builtin.copy:
    src: files/mysql-tmp.te
    dest: /tmp/
  when: not mysql_selinux_update.stat.exists

- name: Compile SELinux module file
  ansible.builtin.command: checkmodule -M -m -o /tmp/mysql-tmp.mod /tmp/mysql-tmp.te
  when: not mysql_selinux_update.stat.exists

- name: Build SELinux policy package
  ansible.builtin.command: semodule_package -o /tmp/mysql-tmp.pp -m /tmp/mysql-tmp.mod
  when: not mysql_selinux_update.stat.exists

- name: Unload SELinux policy package
  ansible.builtin.command: semodule -r mysql-tmp
  when: not mysql_selinux_update.stat.exists
  become: true
  ignore_errors: true

- name: Load SELinux policy package
  ansible.builtin.command: semodule -i /tmp/mysql-tmp.pp
  when: not mysql_selinux_update.stat.exists
  become: true

- name: Remove temporary files
  ansible.builtin.file:
    path: /tmp/mysql-tmp.*
    state: absent
  when: not mysql_selinux_update.stat.exists

- name: Start MariaDB service
  ansible.builtin.systemd:
    name: "{{ mysql_service[ansible_distribution] | default(mysql_service['Debian']) }}"
    state: started
    enabled: true
  become: true
