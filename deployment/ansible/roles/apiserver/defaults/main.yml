---
keystore_src_path: "airavata.p12"
cred_keystore_src_path: "airavata.p12"

apache_maven_version: "apache-maven-3.9.6"
apache_maven_url: "https://archive.apache.org/dist/maven/maven-3/3.9.6/binaries/apache-maven-3.9.6-bin.tar.gz"

apiserver_server_names: "apiserver"
apiserver_log_dir: "{{ apiserver_dir }}/{{ airavata_dist }}/conf/logs"
apiserver_log_max_history: 30
apiserver_log_total_size_cap: "1 GB"

mariadb_connector_jar_url: "https://repo1.maven.org/maven2/org/mariadb/jdbc/mariadb-java-client/3.5.4/mariadb-java-client-3.5.4.jar"

apiserver_systemd_unit_file: "/etc/systemd/system/apiserver.service"

api_server_public_hostname: "localhost"
haproxy_api_server_ssl_cert: "/etc/ssl/{{ api_server_public_hostname }}/{{ api_server_public_hostname }}.pem"
api_server_letsencrypt_ssl_cert: "/etc/letsencrypt/live/{{ api_server_public_hostname }}/cert.pem"

haproxy_service_name:
  CentOS_7: haproxy18
  Rocky_8: haproxy
  Ubuntu: haproxy

haproxy_config_dir:
  CentOS_7: /etc/haproxy18
  Rocky_8: /etc/haproxy
  Ubuntu: /etc/haproxy
