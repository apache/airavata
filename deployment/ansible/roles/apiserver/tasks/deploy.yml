---
- name: Create apiserver deployment directory
  ansible.builtin.file:
    path: "{{ apiserver_dir }}"
    state: directory
    owner: "{{ user }}"
    group: "{{ group }}"

- name: Check if apiserver systemd unit file exists
  ansible.builtin.stat:
    path: "{{ apiserver_systemd_unit_file }}"
  register: systemd_unit_exists

- name: Stop apiserver if running
  ansible.builtin.systemd:
    name: apiserver
    state: stopped
  become: true
  when: systemd_unit_exists.stat.exists

- name: Remove previous deployment
  ansible.builtin.file:
    path: "{{ apiserver_dir }}/{{ airavata_dist }}"
    state: absent

- name: Extract distribution
  ansible.builtin.unarchive:
    src: "{{ airavata_source_dir }}/airavata-api/modules/distribution/target/{{ airavata_dist_name }}"
    dest: "{{ apiserver_dir }}/"
    copy: no

- name: Copy configuration files
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "{{ apiserver_dir }}/{{ airavata_dist }}/conf/{{ item.dest }}"
    owner: "{{ user }}"
    group: "{{ group }}"
    mode: "u=rw,g=r,o=r"
  loop:
    - { src: "application.properties.j2", dest: "application.properties" }
    - { src: "logback.xml.j2", dest: "logback.xml" }

- name: Create logs directory
  ansible.builtin.file:
    path: "{{ apiserver_log_dir }}"
    state: directory
    owner: "{{ user }}"
    group: "{{ group }}"

- name: Download MariaDB connector
  ansible.builtin.get_url:
    url: "{{ mariadb_connector_jar_url }}"
    dest: "{{ apiserver_dir }}/{{ airavata_dist }}/lib/"
    owner: "{{ user }}"
    group: "{{ group }}"

- name: Install systemd service
  ansible.builtin.template:
    src: apiserver.service.j2
    dest: "{{ apiserver_systemd_unit_file }}"
  become: true

- name: Configure SELinux for startup script
  ansible.posix.sefcontext:
    target: "{{ apiserver_dir }}/{{ airavata_dist }}/bin/airavata.sh"
    setype: bin_t
    state: present
  become: true
  when: ansible_distribution == "Rocky"

- name: Apply SELinux file context
  ansible.builtin.command: "restorecon -v {{ apiserver_dir }}/{{ airavata_dist }}/bin/airavata.sh"
  become: true
  when: ansible_distribution == "Rocky"

- name: Build airavata-agent Go binary
  ansible.builtin.command: >
    go build -o airavata-agent
    -ldflags "-s -w"
    .
  args:
    chdir: "{{ airavata_source_dir }}/airavata-agent"
  environment:
    GOOS: linux
    GOARCH: amd64
    CGO_ENABLED: "0"
  register: agent_build
  tags: update

- name: Copy airavata-agent binary to distribution bin/
  ansible.builtin.copy:
    src: "{{ airavata_source_dir }}/airavata-agent/airavata-agent"
    dest: "{{ apiserver_dir }}/{{ airavata_dist }}/bin/airavata-agent"
    owner: "{{ user }}"
    group: "{{ group }}"
    mode: "0755"
    remote_src: true

- name: Start and enable apiserver
  ansible.builtin.systemd:
    name: apiserver
    state: started
    enabled: true
    daemon_reload: yes
  become: true
