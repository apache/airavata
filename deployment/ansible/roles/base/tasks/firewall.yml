---
- name: Install firewalld
  ansible.builtin.package:
    name: firewalld
    state: present
  become: true

- name: Start firewalld service
  ansible.builtin.systemd:
    name: firewalld
    state: started
  become: true
  when: ansible_os_family == "RedHat"

- name: Open firewall port 22 for SSH (RedHat)
  ansible.posix.firewalld:
    port: "22/tcp"
    zone: public
    permanent: yes
    state: enabled
    immediate: yes
  become: true
  when: ansible_os_family == "RedHat"

- name: Open firewall port 22 for SSH (Debian)
  ansible.builtin.command: firewall-cmd --zone=public --add-port=22/tcp
  become: true
  when: ansible_os_family == "Debian"

- name: Open firewall port 22 for SSH permanently (Debian)
  ansible.builtin.command: firewall-cmd --zone=public --permanent --add-port=22/tcp
  become: true
  when: ansible_os_family == "Debian"
