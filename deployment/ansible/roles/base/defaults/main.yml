---
os_packages:
  RedHat:
    java: "java-25-openjdk-devel"
    certbot: ["certbot", "python3-certbot-apache"]
    auto_updates:
      CentOS: ["yum-cron", "yum-utils"]
      Rocky: ["dnf-automatic"]
  Debian:
    java: "openjdk-25-jdk"
    certbot: ["certbot", "python3-certbot-apache"]
    auto_updates: ["unattended-upgrades"]

java_home:
  RedHat: "/usr/lib/jvm/java-25"
  Debian: "/usr/lib/jvm/java-25-openjdk-amd64"

auto_update_config:
  CentOS:
    src: "yum-cron.conf"
    dest: "/etc/yum/yum-cron.conf"
    service: "yum-cron"
  Rocky:
    src: "dnf-cron.conf"
    dest: "/etc/dnf/automatic.conf"
    service: "dnf-automatic.timer"
  Debian:
    src: ""
    dest: ""
    service: ""
