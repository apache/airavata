---
# Local single-machine inventory for *.airavata.localhost
# All services run on 127.0.0.1. Suitable for development / smoke testing.
#
# /etc/hosts:
#   127.0.0.1  airavata.localhost api.airavata.localhost auth.airavata.localhost db.airavata.localhost temporal.airavata.localhost
#
# Usage:
#   ansible-playbook -i inventories/local deploy.yml
#   ansible-playbook -i inventories/local deploy.yml --tags apiserver

ansible_connection: local
ansible_user: "{{ lookup('env', 'USER') }}"

user: "{{ lookup('env', 'USER') }}"
group: "{{ lookup('env', 'USER') }}"
user_home: "{{ lookup('env', 'HOME') }}"

# Source and deployment
airavata_source_dir: "{{ user_home }}/airavata-src"
deployment_dir: "{{ user_home }}/airavata-deployment"
airavata_repo: "https://github.com/apache/airavata.git"
airavata_dist: "apache-airavata-server-0.21-SNAPSHOT"
airavata_dist_name: "{{ airavata_dist }}-bin.tar.gz"
git_branch: "master"

# Hostnames (subdomain-based)
api_server_public_hostname: "api.airavata.localhost"
keycloak_vhost_servername: "auth.airavata.localhost"
portal_hostname: "airavata.localhost"

# Database
db_server: "127.0.0.1"
db_server_port: "3306"
db_name: "airavata"
db_user: "airavata"
db_password: "123456"
mysql_root_password: "123456"
keycloak_db_host: "127.0.0.1"
keycloak_db_username: "keycloak"
keycloak_db_password: "123456"

# API Server
api_server_host: "127.0.0.1"
api_server_port: "8090"
apiserver_dir: "{{ deployment_dir }}/apiserver"
tls_enable: "false"
enable_sharing: "true"

# Keystores
keystore_src_path: "{{ inventory_dir }}/files/airavata.p12"
keystore_passwd: "airavata"
cred_keystore_src_path: "{{ inventory_dir }}/files/airavata.p12"
cred_keystore_passwd: "airavata"
cred_keystore_alias: "airavata"

# Keycloak
iam_server_url: "http://auth.airavata.localhost:8080"
iam_server_super_admin_username: "admin"
iam_server_super_admin_password: "admin"
iam_oauth_client_id: "pga"
iam_oauth_client_secret: ""
keycloak_master_account_username: "admin"
keycloak_master_account_password: "admin"

# Temporal
temporal_version: "1.1.1"
temporal_port: 7233
temporal_ui_port: 8233
spring_temporal_target: "127.0.0.1:{{ temporal_port }}"

# Portal
portal_repo: "https://github.com/apache/airavata.git"
portal_repo_subdir: "airavata-portal"
portal_port: 3000
portal_api_url: "http://api.airavata.localhost:8090"
portal_keycloak_issuer: "http://auth.airavata.localhost:8080/realms/default"
portal_keycloak_client_id_value: "pga"
portal_keycloak_client_secret_value: "changeme"
portal_nextauth_url: "http://airavata.localhost:3000"
portal_nextauth_secret_value: "dev-nextauth-secret-changeme"

# Agent
agent_binary_path: "{{ apiserver_dir }}/{{ airavata_dist }}/bin/airavata-agent"

default_gateway: "default"
