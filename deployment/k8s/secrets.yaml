# IMPORTANT: All values below are base64-encoded placeholders.
# Before deploying to any environment, replace every value with the actual secret
# encoded as: echo -n 'your-secret' | base64
#
# For production use, consider managing secrets via:
#   - Sealed Secrets (https://github.com/bitnami-labs/sealed-secrets)
#   - External Secrets Operator (https://external-secrets.io)
#   - HashiCorp Vault with the Vault Agent Injector
#
# DO NOT commit real credentials to source control.
---
apiVersion: v1
kind: Secret
metadata:
  name: mariadb-secret
  namespace: airavata
  labels:
    app.kubernetes.io/name: mariadb
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: airavata
type: Opaque
data:
  # Plaintext equivalents (CHANGE BEFORE DEPLOYING):
  #   MYSQL_ROOT_PASSWORD: changeme-root
  #   MYSQL_PASSWORD:      changeme-airavata
  #   KC_DB_PASSWORD:      changeme-keycloak
  MYSQL_ROOT_PASSWORD: Y2hhbmdlbWUtcm9vdA==
  MYSQL_PASSWORD: Y2hhbmdlbWUtYWlyYXZhdGE=
  KC_DB_PASSWORD: Y2hhbmdlbWUta2V5Y2xvYWs=
---
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-secret
  namespace: airavata
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/component: identity
    app.kubernetes.io/part-of: airavata
type: Opaque
data:
  # Plaintext equivalents (CHANGE BEFORE DEPLOYING):
  #   KEYCLOAK_ADMIN:          admin
  #   KEYCLOAK_ADMIN_PASSWORD: changeme-admin
  KEYCLOAK_ADMIN: YWRtaW4=
  KEYCLOAK_ADMIN_PASSWORD: Y2hhbmdlbWUtYWRtaW4=
---
apiVersion: v1
kind: Secret
metadata:
  name: apiserver-secret
  namespace: airavata
  labels:
    app.kubernetes.io/name: apiserver
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: airavata
type: Opaque
data:
  # Plaintext equivalents (CHANGE BEFORE DEPLOYING):
  #   SPRING_DATASOURCE_USERNAME: airavata
  #   SPRING_DATASOURCE_PASSWORD: changeme-airavata
  #   KEYCLOAK_CLIENT_SECRET:     changeme-client-secret
  SPRING_DATASOURCE_USERNAME: YWlyYXZhdGE=
  SPRING_DATASOURCE_PASSWORD: Y2hhbmdlbWUtYWlyYXZhdGE=
  KEYCLOAK_CLIENT_SECRET: Y2hhbmdlbWUtY2xpZW50LXNlY3JldA==
---
apiVersion: v1
kind: Secret
metadata:
  name: portal-secret
  namespace: airavata
  labels:
    app.kubernetes.io/name: portal
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: airavata
type: Opaque
data:
  # Plaintext equivalents (CHANGE BEFORE DEPLOYING):
  #   KEYCLOAK_CLIENT_ID:     pga  (must match setup-keycloak.sh client name)
  #   KEYCLOAK_CLIENT_SECRET: changeme-portal-secret
  #   NEXTAUTH_SECRET:        changeme-nextauth-secret-32chars
  KEYCLOAK_CLIENT_ID: cGdh
  KEYCLOAK_CLIENT_SECRET: Y2hhbmdlbWUtcG9ydGFsLXNlY3JldA==
  NEXTAUTH_SECRET: Y2hhbmdlbWUtbmV4dGF1dGgtc2VjcmV0LTMyY2hhcnM=
