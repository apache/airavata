---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: airavata
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/component: identity
    app.kubernetes.io/part-of: airavata
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: keycloak
  strategy:
    # Recreate avoids two Keycloak nodes competing for the same DB schema during rolling updates.
    # Switch to RollingUpdate only when using an external DB and Keycloak clustering is configured.
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: keycloak
        app.kubernetes.io/component: identity
        app.kubernetes.io/part-of: airavata
    spec:
      terminationGracePeriodSeconds: 60
      initContainers:
        # Wait for MariaDB to be ready before starting Keycloak.
        - name: wait-for-db
          image: mariadb:11.7
          command:
            - /bin/sh
            - -ec
            - |
              until mariadb -h "${MARIADB_HOST}" -u keycloak -p"${KC_DB_PASSWORD}" keycloak -e "SELECT 1" >/dev/null 2>&1; do
                echo "Waiting for MariaDB keycloak DB..."; sleep 5;
              done
              echo "MariaDB is ready."
          env:
            - name: MARIADB_HOST
              valueFrom:
                configMapKeyRef:
                  name: airavata-config
                  key: MARIADB_HOST
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mariadb-secret
                  key: KC_DB_PASSWORD
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      containers:
        - name: keycloak
          image: keycloak/keycloak:26.5
          imagePullPolicy: IfNotPresent
          args:
            - start
          env:
            # Admin credentials
            - name: KEYCLOAK_ADMIN
              valueFrom:
                secretKeyRef:
                  name: keycloak-secret
                  key: KEYCLOAK_ADMIN
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-secret
                  key: KEYCLOAK_ADMIN_PASSWORD
            # Database
            - name: KC_DB
              valueFrom:
                configMapKeyRef:
                  name: airavata-config
                  key: KC_DB
            - name: KC_DB_URL
              valueFrom:
                configMapKeyRef:
                  name: airavata-config
                  key: KC_DB_URL
            - name: KC_DB_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: airavata-config
                  key: KC_DB_USERNAME
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mariadb-secret
                  key: KC_DB_PASSWORD
            # Hostname / proxy
            - name: KC_HOSTNAME
              valueFrom:
                configMapKeyRef:
                  name: airavata-config
                  key: KC_HOSTNAME
            - name: KC_HTTP_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: airavata-config
                  key: KC_HTTP_ENABLED
            - name: KC_PROXY
              valueFrom:
                configMapKeyRef:
                  name: airavata-config
                  key: KC_PROXY
            # Disable HTTPS requirement when running behind an HTTP-only ingress locally.
            # Remove this in production (use TLS termination at ingress + KC_PROXY=passthrough or edge).
            - name: KC_HOSTNAME_STRICT_HTTPS
              value: "false"
            - name: KC_HTTP_PORT
              value: "8080"
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 90
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: airavata
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/component: identity
    app.kubernetes.io/part-of: airavata
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
  selector:
    app.kubernetes.io/name: keycloak
