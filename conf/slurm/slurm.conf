# slurm.conf for the Airavata devstack SLURM cluster (SLURM 23.11).
# Shared by every daemon (slurmctld, slurmd on c1/c2) and the login node via the
# slurm_etc named volume, so all components agree on cluster topology + auth.

ClusterName=airavata
SlurmctldHost=slurmctld

# munge provides shared-secret auth; the key lives on the slurm_munge volume.
AuthType=auth/munge
CryptoType=crypto/munge

SlurmUser=slurm
SlurmctldPort=6817
SlurmdPort=6818
StateSaveLocation=/var/spool/slurmctld
SlurmdSpoolDir=/var/spool/slurmd
SwitchType=switch/none
MpiDefault=none
ProctrackType=proctrack/linuxproc
TaskPlugin=task/none
ReturnToService=2

SlurmctldPidFile=/var/run/slurm/slurmctld.pid
SlurmdPidFile=/var/run/slurm/slurmd.pid

# Timeouts kept short so containers register quickly and Tilt flips to ready fast.
SlurmctldTimeout=30
SlurmdTimeout=30
InactiveLimit=0
MinJobAge=300
KillWait=30
Waittime=0

# Scheduling
SchedulerType=sched/backfill
SelectType=select/cons_tres
SelectTypeParameters=CR_Core

# Logging — to stdout/journal-style files; container stdout shows daemon logs too.
SlurmctldDebug=info
SlurmctldLogFile=/var/log/slurm/slurmctld.log
SlurmdDebug=info
SlurmdLogFile=/var/log/slurm/slurmd.log

# Accounting via slurmdbd so `sacct` returns job state/history.
AccountingStorageType=accounting_storage/slurmdbd
AccountingStorageHost=slurmdbd
AccountingStoragePort=6819
JobAcctGatherType=jobacct_gather/linux
JobAcctGatherFrequency=30

# --- Compute nodes ---
# Containers have no real hardware inventory; declare modest resources and let
# slurmd report what it actually has. CPUs=2 is plenty for devstack test jobs.
NodeName=c1 NodeAddr=c1 CPUs=2 RealMemory=1024 State=UNKNOWN
NodeName=c2 NodeAddr=c2 CPUs=2 RealMemory=1024 State=UNKNOWN

# --- Partitions ---
# `normal` is the default, up partition spanning both compute nodes. Airavata's
# compute resource should target queue/partition name `normal`.
PartitionName=normal Nodes=c1,c2 Default=YES MaxTime=INFINITE State=UP OverSubscribe=NO
