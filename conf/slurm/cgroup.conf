# cgroup.conf for the Airavata devstack SLURM cluster.
#
# In SLURM 23.11 slurmd ALWAYS initializes a cgroup plugin (to set up the
# slurmstepd scope), even when ProctrackType/TaskPlugin/JobAcctGather use no
# cgroups. The default cgroup/v2 plugin requires systemd + dbus + a writable
# cgroup hierarchy — none of which exist in these unprivileged containers
# (colima exposes /sys/fs/cgroup read-only). So we force cgroup/v1, whose plugin
# only needs the controller directories to exist (mkdir-able). The entrypoint
# mounts a writable tmpfs at /sys/fs/cgroup and pre-creates those directories;
# with every Constrain* disabled the plugin imposes no real resource limits.
CgroupPlugin=cgroup/v1
ConstrainCores=no
ConstrainRAMSpace=no
ConstrainDevices=no
