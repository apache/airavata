# slurmdbd.conf — config for the SLURM database daemon (accounting).
# Must be mode 0600 and owned by SlurmUser; the Dockerfile enforces that.
#
# slurmdbd persists job accounting into a dedicated MariaDB (the slurm-dbmysql
# service), which is what makes `sacct` return job state and history.

AuthType=auth/munge
DbdHost=slurmdbd
DbdPort=6819

SlurmUser=slurm

DebugLevel=info
LogFile=/var/log/slurm/slurmdbd.log
PidFile=/var/run/slurm/slurmdbd.pid

# Accounting storage backend — the dedicated devstack MariaDB for SLURM.
StorageType=accounting_storage/mysql
StorageHost=slurm-dbmysql
StoragePort=3306
StorageUser=slurm
StoragePass=slurm
StorageLoc=slurm_acct_db
