# compose.dind.yml
# The single host-visible container: a Docker-in-Docker host for the entire Airavata
# dev stack. Tilt manages ONLY this container; `tilt down` removes it and everything
# running inside it. `docker ps` on the host shows just `airavata-dind`.
services:
  airavata-dind:
    image: docker:28-dind
    container_name: airavata-dind
    privileged: true
    environment:
      DOCKER_TLS_CERTDIR: ""          # plain local daemon; driven via `docker exec`
    volumes:
      - .:/workspace/airavata          # host repo -> DinD (inner compose working dir)
    working_dir: /workspace/airavata
    ports:
      - "80:80"        # Traefik ingress (HTTP, *.airavata.localhost)
      - "443:443"      # Traefik ingress (HTTPS)
      - "5000:5000"    # in-DinD registry
      - "9090:9090"    # airavata-server (gRPC + REST, direct)
      - "13306:13306"  # MariaDB (host DB tools)
    healthcheck:
      test: ["CMD", "docker", "info"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s
