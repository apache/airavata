airavata:
  servers:
    - grpc

spring:
  datasource:
    url: jdbc:mariadb://localhost:13306/airavata
    username: airavata
    password: ${AIRAVATA_DB_PASSWORD:123456}
    driver-class-name: org.mariadb.jdbc.Driver
    hikari:
      pool-name: AiravataPool
      connection-timeout: 30000
      initialization-fail-timeout: -1
      minimum-idle: 2
      maximum-pool-size: 20
      leak-detection-threshold: 20000
  jpa:
    hibernate:
      ddl-auto: none
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    open-in-view: false
    properties:
      hibernate:
        enable_lazy_load_no_trans: true
  main:
    web-application-type: none

# Armeria server
armeria:
  ports:
    - port: 9090
      protocols:
        - HTTP
  max-request-length: 20971520

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

airavata.security:
  openid-url: http://localhost:18080/realms/default

airavata.agent:
  storage-resource-id: localhost_77116e91-f042-4d3a-ab9c-3e7b4ebcd5bd
  storage-path: /tmp
  cluster:
    application-interface-id: AiravataAgent_f4313e4d-20c2-4bf6-bff1-8aa0f0b0c1d6
  tunnel:
    server-host: localhost
    server-port: 17000
    server-token: airavata
    server-api-url: http://localhost:8000

airavata.research:
  hub-url: http://localhost:20000
  portal-url: http://localhost:5173
  dev-url: http://localhost:5173
  dev-user: "airavata@apache.org"
  admin-api-key: "JUPYTER_ADMIN_API_KEY"
  limit: 10
