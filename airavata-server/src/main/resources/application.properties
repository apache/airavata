# =============================================================================
# Airavata Unified Server Configuration
# =============================================================================
# All properties consolidated into this single file.
# Environment variables override any value: ${ENV_VAR:default}

# --- Server ---
airavata.config.dir=.
airavata.servers=grpc,orchestrator
apiserver.host=0.0.0.0
apiserver.port=9090

# --- Armeria ---
armeria.ports[0].port=9090
armeria.ports[0].protocols[0]=HTTP

# --- Database ---
spring.datasource.url=jdbc:mariadb://localhost:13306/airavata
spring.datasource.username=airavata
spring.datasource.password=${AIRAVATA_DB_PASSWORD:123456}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.hikari.pool-name=AiravataPool
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.initialization-fail-timeout=-1
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.leak-detection-threshold=20000
validationQuery=SELECT 1

# --- JPA ---
# validate (not update/create): the schema is built outside the JVM from
# db/migration/airavata/V1__Baseline_schema.sql via the db container's initdb, and the
# tenant is seeded from conf/db/seed.sql. Hibernate only verifies the live schema matches
# the @Entity mappings — it never mutates it. Regenerate V1 from the live schema if entities change.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true

# --- Spring ---
spring.main.web-application-type=none
spring.autoconfigure.exclude=com.linecorp.armeria.spring.ArmeriaBeanPostProcessorConfiguration

# --- Actuator ---
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# --- CORS ---
airavata.cors.allowed-origins=*

# --- Security / IAM ---
airavata.security.openid-url=http://localhost:18080/realms/default
iam.server.url=http://localhost:18080
iam.server.super.admin.username=admin
iam.server.super.admin.password=admin
security.manager.class=org.apache.airavata.iam.KeyCloakSecurityManager
authz.cache.enabled=true
authz.cache.manager.class=org.apache.airavata.iam.authzcache.DefaultAuthzCacheManager
TLS.enabled=false
TLS.client.timeout=10000
tls.cert.path=conf/keystores/server.crt
tls.key.path=conf/keystores/server.key
credential.store.keystore.url=conf/keystores/airavata.sym.p12
credential.store.keystore.password=airavata
credential.store.keystore.alias=airavata

# --- Gateway ---
default.registry.gateway=default
default.registry.oauth.client.id=pga
default.registry.oauth.client.secret=m36BXQIxX3j3VILadeHMK5IvbOeRlCCc
default.registry.user=default-admin
default.registry.password=ade4#21242ftfd
super.tenant.gatewayId=default
enable.sharing=true
enable.validation=true

# --- Orchestration ---
host.scheduler=org.apache.airavata.orchestration.scheduling.DefaultHostScheduler
job.validators=org.apache.airavata.orchestration.validation.BatchQueueValidator,org.apache.airavata.orchestration.validation.ExperimentStatusValidator

# --- DB-transactional Process Executor ---
orchestration.executor.threads=4
orchestration.executor.poll.interval.ms=3000
# The lease MUST exceed the longest task's max runtime (currently MonitoringTask MAX_WAIT_MS = 30 min)
# or the sweeper reclaims still-running tasks, causing duplicate concurrent runs and false failures.
orchestration.executor.lease.timeout.ms=2700000
orchestration.executor.max.attempts=3

# --- Job Notifications ---
job.notification.enable=true
job.notification.emailids=

# --- Storage ---
local.data.location=/tmp
max.archive.size=21474836480
enable.streaming.transfer=false

# --- Agent Tunnel ---
airavata.agent.tunnel.server-host=localhost
airavata.agent.tunnel.server-port=17000
airavata.agent.tunnel.server-token=airavata
airavata.agent.tunnel.server-api-url=http://localhost:8000

# --- Research Hub ---
airavata.research.hub-url=http://localhost:20000
airavata.research.portal-url=http://localhost:5173
airavata.research.dev-url=http://localhost:5173
airavata.research.dev-user=airavata@apache.org
airavata.research.admin-api-key=JUPYTER_ADMIN_API_KEY
airavata.research.limit=10

# --- Misc ---
in.memory.cache.size=1000
StrictHostKeyChecking=no
