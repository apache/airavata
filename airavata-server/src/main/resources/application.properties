# =============================================================================
# Airavata Unified Server Configuration
# =============================================================================
# All properties consolidated into this single file.
# Environment variables override any value: ${ENV_VAR:default}

# --- Server ---
airavata.config.dir=.
airavata.servers=grpc
apiserver.host=0.0.0.0
apiserver.port=9090

# --- Armeria ---
armeria.ports[0].port=9090
armeria.ports[0].protocols[0]=HTTP

# --- Database ---
spring.datasource.url=jdbc:mariadb://localhost:13306/airavata
spring.datasource.username=airavata
spring.datasource.password=${AIRAVATA_DB_PASSWORD:123456}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.hikari.pool-name=AiravataPool
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.initialization-fail-timeout=-1
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.leak-detection-threshold=20000
validationQuery=SELECT 1

# --- JPA ---
spring.jpa.hibernate.ddl-auto=none
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true

# --- Spring ---
spring.main.web-application-type=none

# --- Actuator ---
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# --- CORS ---
airavata.cors.allowed-origins=*

# --- Security / IAM ---
airavata.security.openid-url=http://localhost:18080/realms/default
iam.server.url=http://localhost:18080
iam.server.super.admin.username=admin
iam.server.super.admin.password=admin
security.manager.class=org.apache.airavata.iam.KeyCloakSecurityManager
authz.cache.enabled=true
authz.cache.manager.class=org.apache.airavata.iam.authzcache.DefaultAuthzCacheManager
TLS.enabled=false
TLS.client.timeout=10000
tls.cert.path=conf/keystores/server.crt
tls.key.path=conf/keystores/server.key
credential.store.keystore.url=conf/keystores/airavata.sym.p12
credential.store.keystore.password=airavata
credential.store.keystore.alias=airavata

# --- Gateway ---
default.registry.gateway=default
default.registry.oauth.client.id=pga
default.registry.oauth.client.secret=upCMVu2RZcAXUqpr9V7phAbz6hhF9cbl
default.registry.user=default-admin
default.registry.password=ade4#21242ftfd
super.tenant.gatewayId=default
enable.sharing=true
enable.validation=true

# --- Helix Orchestration ---
helix.cluster.name=AiravataCluster
helix.controller.name=AiravataController
helix.participant.name=AiravataParticipant
host.scheduler=org.apache.airavata.orchestration.scheduling.DefaultHostScheduler
job.validators=org.apache.airavata.orchestration.validation.BatchQueueValidator,org.apache.airavata.orchestration.validation.ExperimentStatusValidator

# --- Messaging (RabbitMQ) ---
rabbitmq.broker.url=amqp://airavata:airavata@localhost:5672
rabbitmq.experiment.exchange.name=experiment_exchange
rabbitmq.process.exchange.name=process_exchange
rabbitmq.status.exchange.name=status_exchange
durable.queue=false
prefetch.count=200

# --- Kafka ---
kafka.broker.url=localhost:9092

# --- ZooKeeper ---
zookeeper.server.connection=localhost:2181
embedded.zk=false

# --- Monitoring ---
cluster.status.monitoring.enable=false
cluster.status.monitoring.repeat.time=18000
enable.realtime.monitor=false
realtime.monitor.broker.consumer.group=monitor
realtime.monitor.broker.topic=helix-airavata-mq
job.monitor.broker.publisher.id=AiravataMonitorPublisher
job.monitor.broker.topic=monitoring-data
job.monitor.broker.consumer.group=MonitoringConsumer

# --- Email Monitor ---
email.based.monitor.address=monitoring.airavata@gmail.com
email.based.monitor.folder.name=INBOX
email.based.monitor.host=imap.gmail.com
email.based.monitor.password=123456
email.based.monitor.store.protocol=imaps
email.based.monitoring.period=10000
email.expiration.minutes=60
job.monitor.email.publisher.id=EmailBasedProducer
job.monitor.realtime.publisher.id=RealtimeProducer

# --- Job Notifications ---
job.notification.enable=true
job.notification.emailids=
job.status.publish.endpoint=http://localhost:8082/topics/helix-airavata-mq

# --- Data Parsing ---
data.analyzer.job.scanning.enable=false
data.parser.delete.container=true
data.parser.broker.publisher.id=ParsingPublisher
data.parser.broker.consumer.group=ParsingConsumer
data.parser.topic=parsing-data
data.parser.storage.resource.id=CHANGE_ME
parser.workflow.manager.name=ParserWorkflowManager

# --- Workflow Managers ---
pre.workflow.manager.name=AiravataPreWM
pre.workflow.manager.loadbalance.clusters=false
post.workflow.manager.name=AiravataPostWM
post.workflow.manager.loadbalance.clusters=false
metaschedluer.job.scanning.enable=false

# --- Storage ---
local.data.location=/tmp
max.archive.size=21474836480
enable.streaming.transfer=false

# --- Agent Tunnel ---
airavata.agent.tunnel.server-host=localhost
airavata.agent.tunnel.server-port=17000
airavata.agent.tunnel.server-token=airavata
airavata.agent.tunnel.server-api-url=http://localhost:8000

# --- Research Hub ---
airavata.research.hub-url=http://localhost:20000
airavata.research.portal-url=http://localhost:5173
airavata.research.dev-url=http://localhost:5173
airavata.research.dev-user=airavata@apache.org
airavata.research.admin-api-key=JUPYTER_ADMIN_API_KEY
airavata.research.limit=10

# --- Misc ---
in.memory.cache.size=1000
StrictHostKeyChecking=no
