networks:
  airavata-network:
    driver: bridge

volumes:
  db_data:
    driver: local

services:
  keycloak:
    image: keycloak/keycloak:25.0
    container_name: keycloak
    restart: always
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    volumes:
      - ./keycloak/realm-default.json:/opt/keycloak/data/import/realm-default.json
      - ./keycloak/realm-master.json:/opt/keycloak/data/import/realm-master.json
      - ./keycloak/keycloak.conf:/opt/keycloak/conf/keycloak.conf
    command: ["start", "--import-realm"]
    networks:
      - airavata-network
    ports:
      - "18080:18080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18080/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  db:
    image: mariadb:10.4.13
    container_name: db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_USER: airavata
      MYSQL_PASSWORD: 123456
    volumes:
      - db_data:/var/lib/mysql
      - ./init-db:/docker-entrypoint-initdb.d:ro
    command:
      [
        "mysqld",
        "--character-set-server=utf8mb4",
        "--collation-server=utf8mb4_unicode_ci",
        "--sql-mode=NO_ENGINE_SUBSTITUTION",
      ]
    networks:
      - airavata-network
    ports:
      - "13306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p123456"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: always
    networks:
      - airavata-network
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
