# ==================== Core Configuration ====================
airavata.config.dir=.
airavata.defaults.gateway=dev_gateway
airavata.validation.enabled=false

# ==================== Database Configuration ====================
# App Catalog Database
database.catalog.driver=org.mariadb.jdbc.Driver
database.catalog.password=123456
database.catalog.url=jdbc:mariadb://mysql:3306/app_catalog
database.catalog.user=airavata
database.catalog.validation-query=SELECT 1

# Profile Service Database
database.profile.driver=org.mariadb.jdbc.Driver
database.profile.password=123456
database.profile.url=jdbc:mariadb://mysql:3306/profile_service
database.profile.user=airavata
database.profile.validation-query=SELECT 1

# Registry Database
database.registry.driver=org.mariadb.jdbc.Driver
database.registry.password=123456
database.registry.url=jdbc:mariadb://mysql:3306/experiment_catalog
database.registry.user=airavata
database.registry.validation-query=SELECT 1

# Replica Catalog Database
database.replica.driver=org.mariadb.jdbc.Driver
database.replica.password=123456
database.replica.url=jdbc:mariadb://mysql:3306/replica_catalog
database.replica.user=airavata
database.replica.validation-query=SELECT 1

# Sharing Catalog Database
database.sharing.driver=org.mariadb.jdbc.Driver
database.sharing.password=123456
database.sharing.url=jdbc:mariadb://mysql:3306/sharing_catalog
database.sharing.user=airavata
database.sharing.validation-query=SELECT 1

# Credential Store Database (Vault)
database.vault.driver=org.mariadb.jdbc.Driver
database.vault.password=123456
database.vault.url=jdbc:mariadb://mysql:3306/credential_store
database.vault.user=airavata
database.vault.validation-query=SELECT 1

# Workflow Catalog Database
database.workflow.driver=org.mariadb.jdbc.Driver
database.workflow.password=123456
database.workflow.url=jdbc:mariadb://mysql:3306/workflow_catalog
database.workflow.user=airavata
database.workflow.validation-query=SELECT 1

# ==================== Messaging Configuration ====================
# Helix
helix.cluster.name=AiravataCluster
helix.controller.name=AiravataController
helix.participant.name=AiravataParticipant

# Kafka
kafka.broker-url=kafka:9092

# RabbitMQ
rabbitmq.broker-url=amqp://airavata:airavata@rabbitmq:5672/%2F
rabbitmq.durable-queue=false
rabbitmq.experiment-exchange-name=experiment_exchange
rabbitmq.experiment-launch-queue-name=experiment_launch
rabbitmq.prefetch-count=200
rabbitmq.process-exchange-name=process_exchange
rabbitmq.status-exchange-name=status_exchange

# Zookeeper
zookeeper.embedded=false
zookeeper.server-connection=zookeeper:2181

# ==================== Security Configuration ====================
security.authzCache.enabled=true
security.iam.oauth-client-id=pga
security.iam.oauth-client-secret=upCMVu2RZcAXUqpr9V7phAbz6hhF9cbl
security.iam.server-url=http://localhost:18080
security.iam.super.password=ade4#21242ftfd
security.iam.super.username=admin
security.tls.keystore.password=airavata
security.tls.keystore.path=keystores/airavata.p12
security.tls.client-timeout=10000
security.tls.enabled=false

# ==================== Services Configuration ====================
# API Service enable flags (both can be enabled simultaneously)
# Note: Database/persistence is automatically enabled when either REST or Thrift API is enabled
services.rest.enabled=false
services.thrift.enabled=true

# Controller Service
services.controller.enabled=true

# Participant Service
services.participant.enabled=true

# Thrift API Service
# All Thrift services (Airavata, Profile, Orchestrator, Registry, Vault, Sharing Registry) are now
# multiplexed on a single port. Individual service toggles and ports removed.
services.thrift.port=8930

# REST API Service
services.rest.port=8082

# API Vault Service (Credential Store) - Keystore configuration only (not server port)
security.vault.keystore.alias=airavata
security.vault.keystore.password=airavata
security.vault.keystore.url=keystores/airavata.sym.p12

# Monitor Services
# Cluster Status Monitor
# Compute Monitor (unified job status and cluster status monitoring)
services.monitor.compute.broker-consumer-group=MonitoringConsumer
services.monitor.compute.broker-publisher-id=AiravataMonitorPublisher
services.monitor.compute.broker-topic=monitoring-data
services.monitor.compute.cluster-check-repeat-time=18000
services.monitor.compute.cluster-check-time-window=300
services.monitor.compute.email-publisher-id=EmailBasedProducer
services.monitor.compute.enabled=true
services.monitor.compute.notification.emailids=
services.monitor.compute.realtime-publisher-id=RealtimeProducer
services.monitor.compute.status-publish-endpoint=http://localhost:8082/topics/helix-airavata-mq
services.monitor.compute.validators=org.apache.airavata.orchestrator.core.validator.impl.BatchQueueValidator,org.apache.airavata.orchestrator.core.validator.impl.ExperimentStatusValidator

# Email Monitor
services.monitor.email.address=monitoring.airavata@gmail.com
services.monitor.email.connection-retry-interval=30000
services.monitor.email.enabled=false
services.monitor.email.expiry-mins=60
services.monitor.email.folder-name=INBOX
services.monitor.email.host=imap.gmail.com
services.monitor.email.password=123456
services.monitor.email.period=10000
services.monitor.email.store-protocol=imaps

# Realtime Monitor
services.monitor.realtime.broker-consumer-group=monitor
services.monitor.realtime.broker-topic=helix-airavata-mq
services.monitor.realtime.enabled=true

# Parser Service
services.parser.broker-consumer-group=ParsingConsumer
services.parser.delete-container=true
services.parser.enabled=false
services.parser.enabled-gateways=
services.parser.loadbalance-clusters=false
services.parser.name=AiravataParserWM
services.parser.scanning-interval=3600
services.parser.scanning-parallel-jobs=1
services.parser.storage-resource-id=CHANGE_ME
services.parser.time-step-seconds=5
services.parser.topic=parsing-data

# Post Workflow Manager Service
services.postwm.enabled=true
services.postwm.loadbalance-clusters=false
services.postwm.name=AiravataPostWM

# Pre Workflow Manager Service
services.prewm.enabled=true
services.prewm.loadbalance-clusters=false
services.prewm.name=AiravataPreWM

# Scheduler Service
services.scheduler.cluster-scanning-interval=1800000
services.scheduler.cluster-scanning-parallel-jobs=1
services.scheduler.compute-resource-rescheduler-policy-class=org.apache.airavata.metascheduler.process.scheduling.engine.rescheduler.ExponentialBackOffReScheduler
services.scheduler.compute-resource-selection-policy-class=org.apache.airavata.metascheduler.process.scheduling.engine.cr.selection.MultipleComputeResourcePolicy
services.scheduler.enabled=false
services.scheduler.interpreter.enabled=true
services.scheduler.job-scanning-interval=1800000
services.scheduler.maximum-rescheduler-threshold=5
services.scheduler.rescheduler.enabled=true

# Additional Service Enable Flags
services.agent.enabled=true
services.dbus.enabled=true
services.file.enabled=true
services.research.enabled=true
