[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --timeout=1800
markers =
    ubuntu: Tests for Ubuntu distribution
    rocky: Tests for Rocky Linux distribution
    centos: Tests for CentOS distribution
    base: Tests for base role
    database: Tests for database role
    redis: Tests for redis role
    apiserver: Tests for apiserver role
    keycloak: Tests for keycloak role
    integration: Integration tests
    slow: Slow running tests
