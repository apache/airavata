---
- name: Install Airavata prerequisites
  ansible.builtin.package:
    name: git
    state: present
  become: true

- name: Download {{ apache_maven_version }}
  ansible.builtin.get_url:
    url: "{{ apache_maven_url }}"
    dest: "/opt/{{ apache_maven_version }}-bin.tar.gz"
  become: true

- name: Extract Maven
  ansible.builtin.unarchive:
    src: "/opt/{{ apache_maven_version }}-bin.tar.gz"
    dest: /opt
    remote_src: true
  become: true

- name: Add Maven to PATH
  ansible.builtin.template:
    src: maven.sh.j2
    dest: /etc/profile.d/maven.sh
  become: true

- name: Create deployment directory
  ansible.builtin.file:
    path: "{{ deployment_dir }}"
    state: directory
    mode: "0755"

- name: Create source directory
  ansible.builtin.file:
    path: "{{ airavata_source_dir }}"
    state: directory
    mode: "0755"
    owner: "{{ user }}"
    group: "{{ group }}"

- name: Checkout Airavata from {{ airavata_repo }} branch {{ git_branch }}
  ansible.builtin.git:
    repo: "{{ airavata_repo }}"
    dest: "{{ airavata_source_dir }}"
    version: "{{ git_branch }}"
  register: checkout
  tags: update

- name: Build Airavata with Maven
  ansible.builtin.command: "/opt/{{ apache_maven_version }}/bin/mvn clean install -Dmaven.test.skip=true"
  args:
    chdir: "{{ airavata_source_dir }}"
  environment:
    MAVEN_OPTS: "-Xmx2048m"
  register: build
  tags: update
