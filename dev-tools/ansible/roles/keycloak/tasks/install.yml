---
- name: Download and unarchive Keycloak
  ansible.builtin.unarchive:
    src: "{{ keycloak_download_url }}"
    dest: "{{ user_home }}"
    copy: no
    owner: "{{ user }}"
    group: "{{ group }}"
    creates: "{{ user_home }}/{{ keycloak_install_dir }}/bin/kc.sh"
  become: true
  become_user: "{{ user }}"
  tags:
    - always

- name: Copy Keycloak configuration file (Quarkus)
  ansible.builtin.template:
    src: keycloak.conf.j2
    dest: "{{ user_home }}/{{ keycloak_install_dir }}/conf/keycloak.conf"
    owner: "{{ user }}"
    group: "{{ group }}"
    mode: "u=rw,g=r,o=r"
  become: true
  become_user: "{{ user }}"
  tags:
    - always

- name: Copy Keycloak systemd unit file
  ansible.builtin.template:
    src: keycloak.service.j2
    dest: /etc/systemd/system/keycloak.service
    backup: yes
  become: true
  tags:
    - always

- name: Start/restart Keycloak
  ansible.builtin.systemd:
    name: keycloak
    state: restarted
    enabled: true
    daemon_reload: yes
  become: true
  tags:
    - always
