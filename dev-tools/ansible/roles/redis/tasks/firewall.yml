---
- name: Open Redis port in firewall (RedHat)
  ansible.posix.firewalld:
    zone: public
    permanent: true
    state: enabled
    immediate: true
    port: "{{ redis_port }}/tcp"
  become: true
  when: ansible_os_family == "RedHat"

- name: Open Redis port in firewall (Debian)
  community.general.ufw:
    rule: allow
    port: "{{ redis_port }}"
    proto: tcp
  become: true
  when: ansible_os_family == "Debian"
