---
- name: Set OS-specific variables
  ansible.builtin.set_fact:
    redis_package: "{{ redis_packages[ansible_os_family] }}"
    redis_config_file: "{{ redis_config_path[ansible_os_family] }}"
    redis_service: "{{ redis_service_name[ansible_os_family] }}"

- name: Install Redis
  ansible.builtin.package:
    name: "{{ redis_package }}"
    state: present
  become: true

- name: Configure Redis to listen on all interfaces
  ansible.builtin.lineinfile:
    path: "{{ redis_config_file }}"
    regexp: '^bind '
    line: 'bind {{ redis_bind_address }}'
    backup: true
  become: true
  ignore_errors: true

- name: Start and enable Redis service
  ansible.builtin.systemd:
    name: "{{ redis_service }}"
    state: started
    enabled: true
    daemon_reload: true
  become: true
