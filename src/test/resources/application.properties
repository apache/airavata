# ==============================================
# DATABASE CONFIGURATION
# ==============================================
# Note: Database connection is provided by TestcontainersConfig in tests
# These properties are defaults but will be overridden by test configuration
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.url=jdbc:mariadb://localhost:13306/airavata
spring.datasource.username=airavata
spring.datasource.password=123456

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Entity packages to scan
spring.jpa.properties.hibernate.archive.autodetection=class
spring.jpa.open-in-view=false

# HikariCP
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.connection-timeout=30000

# ==============================================
# PROFILES
# ==============================================
spring.profiles.active=test

