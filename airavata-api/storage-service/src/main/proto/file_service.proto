syntax = "proto3";

package org.apache.airavata.api.file;

option java_package = "org.apache.airavata.api.file";
option java_multiple_files = true;

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
import "org/apache/airavata/model/data/replica/replica_catalog.proto";

// UserStorageService provides RPCs for managing user files and directories on storage resources.
service UserStorageService {

  rpc UploadFile(UploadFileRequest) returns (org.apache.airavata.model.data.replica.DataProductModel) {
    option (google.api.http) = {
      post: "/api/v1/user-storage/files"
      body: "*"
    };
  }

  rpc DownloadFile(DownloadFileRequest) returns (DownloadFileResponse) {
    option (google.api.http) = {
      get: "/api/v1/user-storage/files:download"
    };
  }

  rpc FileExists(FileExistsRequest) returns (FileExistsResponse) {
    option (google.api.http) = {
      get: "/api/v1/user-storage/files:exists"
    };
  }

  rpc DirExists(DirExistsRequest) returns (DirExistsResponse) {
    option (google.api.http) = {
      get: "/api/v1/user-storage/directories:exists"
    };
  }

  rpc ListDir(ListDirRequest) returns (ListDirResponse) {
    option (google.api.http) = {
      get: "/api/v1/user-storage/directories:list"
    };
  }

  rpc DeleteFile(DeleteFileRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/api/v1/user-storage/files"
    };
  }

  rpc DeleteDir(DeleteDirRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/api/v1/user-storage/directories"
    };
  }

  rpc MoveFile(MoveFileRequest) returns (org.apache.airavata.model.data.replica.DataProductModel) {
    option (google.api.http) = {
      post: "/api/v1/user-storage/files:move"
      body: "*"
    };
  }

  rpc CreateDir(CreateDirRequest) returns (CreateDirResponse) {
    option (google.api.http) = {
      post: "/api/v1/user-storage/directories"
      body: "*"
    };
  }

  rpc CreateSymlink(CreateSymlinkRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/api/v1/user-storage/symlinks"
      body: "*"
    };
  }

  rpc GetFileMetadata(GetFileMetadataRequest) returns (FileMetadataResponse) {
    option (google.api.http) = {
      get: "/api/v1/user-storage/files:metadata"
    };
  }

  rpc ListExperimentDir(ListExperimentDirRequest) returns (ListDirResponse) {
    option (google.api.http) = {
      get: "/api/v1/user-storage/experiments/{experiment_id}/directories:list"
    };
  }

  rpc GetDefaultStorageResourceId(GetDefaultStorageResourceIdRequest) returns (GetDefaultStorageResourceIdResponse) {
    option (google.api.http) = {
      get: "/api/v1/user-storage/default-storage-resource"
    };
  }
}

// FileUploadResponse is returned after a successful file upload.
message FileUploadResponse {
  string name = 1;
  string uri = 2;
  string type = 3;
  int64 size = 4;
}

// FileMetadataResponse contains metadata about a file or directory.
message FileMetadataResponse {
  string name = 1;
  string path = 2;
  int64 size = 3;
  int64 created_time = 4;
  int64 modified_time = 5;
  bool is_directory = 6;
  string content_type = 7;
  string data_product_uri = 8;
}

// Request/Response messages

message UploadFileRequest {
  string storage_resource_id = 1;
  string path = 2;
  string name = 3;
  string content_type = 4;
  bytes content = 5;
}

message DownloadFileRequest {
  string storage_resource_id = 1;
  string path = 2;
}

message DownloadFileResponse {
  bytes content = 1;
  string name = 2;
  string content_type = 3;
}

message FileExistsRequest {
  string storage_resource_id = 1;
  string path = 2;
}

message FileExistsResponse {
  bool exists = 1;
}

message DirExistsRequest {
  string storage_resource_id = 1;
  string path = 2;
}

message DirExistsResponse {
  bool exists = 1;
}

message ListDirRequest {
  string storage_resource_id = 1;
  string path = 2;
}

message ListDirResponse {
  repeated FileMetadataResponse directories = 1;
  repeated FileMetadataResponse files = 2;
}

message DeleteFileRequest {
  string storage_resource_id = 1;
  string path = 2;
}

message DeleteDirRequest {
  string storage_resource_id = 1;
  string path = 2;
}

message MoveFileRequest {
  string storage_resource_id = 1;
  string source_path = 2;
  string destination_path = 3;
}

message CreateDirRequest {
  string storage_resource_id = 1;
  string path = 2;
}

message CreateDirResponse {
  string created_path = 1;
}

message CreateSymlinkRequest {
  string storage_resource_id = 1;
  string source_path = 2;
  string target_path = 3;
}

message GetFileMetadataRequest {
  string storage_resource_id = 1;
  string path = 2;
}

message ListExperimentDirRequest {
  string experiment_id = 1;
}

message GetDefaultStorageResourceIdRequest {}

message GetDefaultStorageResourceIdResponse {
  string storage_resource_id = 1;
}
