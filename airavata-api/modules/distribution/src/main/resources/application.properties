# Dev defaults match .devcontainer/dev.env.defaults (single source of truth)
# ==============================================
# SERVER
# ==============================================
server.port=8090

# DATABASE CONFIGURATION
# Driver is auto-detected from JDBC URL scheme (jdbc:mariadb:// → MariaDB driver).
# No driver-class-name needed — JDBC 4.0+ ServiceLoader and Spring Boot handle discovery.
# ==============================================
spring.datasource.url=jdbc:mariadb://localhost:13306/airavata
spring.datasource.username=airavata
spring.datasource.password=123456

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Entity packages to scan
spring.jpa.properties.hibernate.archive.autodetection=class
spring.jpa.open-in-view=false

# HikariCP
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.leak-detection-threshold=20000

# ==============================================
# AIRAVATA CONFIGURATION
# ==============================================
airavata.default-gateway=default
# Portal config (exposed via GET /api/v1/config; used when Next.js fetches config from API)
airavata.portal.assume-root-when-no-gateways=false
airavata.portal.app-version=
# Must match DEFAULT_ADMIN_USERNAME in .devcontainer/dev.env.defaults
airavata.portal.root-admin-username=default-admin
airavata.flyway.enabled=true
airavata.home=
airavata.in-memory-cache-size=1000
airavata.local-data-location=/tmp/airavata
airavata.max-archive-size=1073741824
airavata.security.authentication.enabled=true
airavata.security.iam.enabled=true
airavata.security.iam.server-url=http://localhost:18080
airavata.security.iam.realm=default
# Spring Security OAuth2 Resource Server — JWT validation via Keycloak JWKS
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:18080/realms/default
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:18080/realms/default/protocol/openid-connect/certs
airavata.security.iam.oauth-client-id=pga
# Must match PGA_CLIENT_SECRET in .devcontainer/dev.env.defaults
airavata.security.iam.oauth-client-secret=m36BXQIxX3j3VILadeHMK5IvbOeRlCCc
# Keycloak master realm admin — must match KEYCLOAK_ADMIN/KEYCLOAK_ADMIN_PASSWORD in compose.yml
airavata.security.iam.super-admin.username=admin
airavata.security.iam.super-admin.password=admin
airavata.security.tls.client-timeout=10000
airavata.security.tls.enabled=false
airavata.security.tls.keystore.password=airavata
airavata.security.tls.keystore.path=keystores/airavata.p12
airavata.security.vault.keystore.alias=airavata
airavata.security.vault.keystore.password=airavata
airavata.security.vault.keystore.url=keystores/airavata.sym.p12
airavata.services.agent.appinterface.id=AiravataAgent_f4313e4d-20c2-4bf6-bff1-8aa0f0b0c1d6
airavata.services.agent.enabled=true
airavata.services.agent.grpc.max-inbound-message-size=20971520
airavata.services.agent.spring.jpa.hibernate.ddl-auto=validate
airavata.services.agent.spring.jpa.open-in-view=false
airavata.services.agent.spring.servlet.multipart.max-file-size=200MB
airavata.services.agent.spring.servlet.multipart.max-request-size=200MB
airavata.services.agent.storage.id=localhost_77116e91-f042-4d3a-ab9c-3e7b4ebcd5bd
airavata.services.agent.storage.path=/tmp
airavata.services.agent.tunnelserver.host=localhost
airavata.services.agent.tunnelserver.port=17000
airavata.services.agent.tunnelserver.token=airavata
airavata.services.agent.tunnelserver.url=http://localhost:8000
airavata.services.controller.enabled=true
airavata.services.dbus.enabled=false
airavata.services.fileserver.enabled=true
airavata.services.fileserver.spring.servlet.multipart.max-file-size=10MB
airavata.services.fileserver.spring.servlet.multipart.max-request-size=10MB
# Compute monitor: job-status-callback-url for job script curl when set
airavata.services.monitor.compute.cluster-check-repeat-time=18000
airavata.services.monitor.compute.cluster-check-time-window=300
airavata.services.monitor.compute.email-publisher-id=EmailBasedProducer
airavata.services.monitor.compute.enabled=true
airavata.services.monitor.compute.job-status-callback-url=http://host.docker.internal:8090/api/v1/monitoring/job-status
airavata.services.monitor.compute.notification.emailids=
airavata.services.monitor.compute.realtime-publisher-id=RealtimeProducer
airavata.services.monitor.email.address=monitoring.airavata@gmail.com
airavata.services.monitor.email.connection-retry-interval=30000
airavata.services.monitor.email.enabled=false
airavata.services.monitor.email.expiry-mins=60
airavata.services.monitor.email.folder-name=INBOX
airavata.services.monitor.email.host=imap.gmail.com
airavata.services.monitor.email.password=123456
airavata.services.monitor.email.period=10000
airavata.services.monitor.email.store-protocol=imaps
# Realtime: In-process delivery via Spring ApplicationEvents
airavata.services.monitor.realtime.enabled=true
airavata.services.participant.enabled=true
airavata.services.registry.enabled=true
airavata.services.research.enabled=true
airavata.services.research.grpc.keepalive-time=30s
airavata.services.research.grpc.keepalive-timeout=5s
airavata.services.research.grpc.max-inbound-message-size=20971520
airavata.services.research.grpc.permit-keepalive-time=5m
airavata.services.research.grpc.permit-keepalive-without-calls=true
airavata.services.research.hub.adminApiKey=JUPYTER_ADMIN_API_KEY
airavata.services.research.hub.limit=10
airavata.services.research.hub.url=http://localhost:20000
airavata.services.research.openid.url=http://localhost:18080/realms/default
airavata.services.research.portal.dev-url=http://localhost:5173
airavata.services.research.portal.url=http://localhost:5173
airavata.services.research.spring.servlet.multipart.max-file-size=200MB
airavata.services.research.spring.servlet.multipart.max-request-size=200MB
airavata.services.research.springdoc.api-docs.enabled=true
airavata.services.research.springdoc.swagger-ui.doc-expansion=none
airavata.services.research.springdoc.swagger-ui.oauth.client-id=data-catalog-portal
airavata.services.research.springdoc.swagger-ui.oauth.use-pkce-with-authorization-code-grant=true
airavata.services.research.springdoc.swagger-ui.operationsSorter=alpha
airavata.services.research.springdoc.swagger-ui.path=/swagger-ui.html
airavata.services.research.springdoc.swagger-ui.tagsSorter=alpha

# OpenAPI / Swagger UI for main REST API
springdoc.api-docs.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.doc-expansion=none

airavata.services.scheduler.cluster-scanning-interval=1800000
airavata.services.scheduler.cluster-scanning-parallel-jobs=1
airavata.services.scheduler.interpreter.enabled=true
airavata.services.scheduler.job-scanning-interval=1800000
airavata.services.scheduler.maximum-rescheduler-threshold=5
airavata.services.scheduler.rescheduler-policy=exponential-backoff
airavata.services.scheduler.rescheduler.enabled=true
airavata.services.scheduler.selection-policy=default
airavata.services.rest.enabled=true
airavata.services.sharing.enabled=true
airavata.services.telemetry.enabled=true

# gRPC server
spring.grpc.server.port=9090
spring.grpc.server.enabled=false
airavata.sharing.enabled=true
airavata.streaming-transfer.enabled=false
airavata.validation-enabled=true

# ==============================================
# TEMPORAL WORKFLOW ENGINE
# ==============================================
spring.temporal.connection.target=localhost:7233
spring.temporal.namespace=default
spring.temporal.workers-auto-discovery.packages[0]=org.apache.airavata.execution

# Disable Spring Boot devtools restart to prevent broken logging
spring.devtools.restart.enabled=false

# ==============================================
# LOGGING
# ==============================================
logging.file.name=/tmp/airavata-logback.log
logging.level.org.hibernate=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.tool.schema=ERROR
logging.level.org.hibernate.tool.schema.internal.SchemaDropperImpl=ERROR
logging.level.org.mariadb.jdbc.message.server.ErrorPacket=ERROR
logging.level.com.zaxxer.hikari=WARN
logging.level.org.springframework=WARN
logging.level.org.testcontainers=WARN
logging.level.org.hibernate.engine.jdbc.spi.SqlExceptionHelper=WARN
logging.level.org.apache.airavata.iam.keycloak.KeycloakRestClient=WARN
logging.level.org.apache.airavata.iam.keycloak.KeycloakGatewayManagement=WARN
logging.level.org.apache.airavata.credential.service.CredentialEntityService=WARN
logging.level.org.apache.airavata.service.registry.RegistryService=DEBUG
logging.level.org.apache.airavata.service.SharingRegistryService=WARN
logging.level.org.apache.airavata.execution=DEBUG

# ==============================================
# MANAGEMENT
# ==============================================
management.endpoint.health.show-details=when_authorized
management.endpoint.prometheus.enabled=true
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.metrics.export.prometheus.enabled=true
