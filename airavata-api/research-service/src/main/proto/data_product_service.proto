syntax = "proto3";

package org.apache.airavata.api.dataproduct;

option java_package = "org.apache.airavata.api.dataproduct";
option java_multiple_files = true;

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
import "org/apache/airavata/model/data/replica/replica_catalog.proto";

// DataProductService provides RPCs for managing data products and replica locations.
service DataProductService {

  rpc RegisterDataProduct(RegisterDataProductRequest) returns (RegisterDataProductResponse) {
    option (google.api.http) = {
      post: "/api/v1/data-products"
      body: "data_product"
    };
  }

  rpc GetDataProduct(GetDataProductRequest) returns (org.apache.airavata.model.data.replica.DataProductModel) {
    option (google.api.http) = {
      get: "/api/v1/data-products/{product_uri}"
    };
  }

  rpc RegisterReplicaLocation(RegisterReplicaLocationRequest) returns (RegisterReplicaLocationResponse) {
    option (google.api.http) = {
      post: "/api/v1/data-products/{product_uri}/replicas"
      body: "replica_location"
    };
  }

  rpc GetParentDataProduct(GetParentDataProductRequest) returns (org.apache.airavata.model.data.replica.DataProductModel) {
    option (google.api.http) = {
      get: "/api/v1/data-products/{product_uri}/parent"
    };
  }

  rpc GetChildDataProducts(GetChildDataProductsRequest) returns (GetChildDataProductsResponse) {
    option (google.api.http) = {
      get: "/api/v1/data-products/{product_uri}/children"
    };
  }

  rpc UpdateDataProduct(UpdateDataProductRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      put: "/api/v1/data-products/{product_uri}"
      body: "data_product"
    };
  }

  rpc DeleteDataProduct(DeleteDataProductRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/api/v1/data-products/{product_uri}"
    };
  }

  rpc GetReplicaLocation(GetReplicaLocationRequest) returns (org.apache.airavata.model.data.replica.DataReplicaLocationModel) {
    option (google.api.http) = {
      get: "/api/v1/data-products/replicas/{replica_id}"
    };
  }

  rpc UpdateReplicaLocation(UpdateReplicaLocationRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      put: "/api/v1/data-products/replicas/{replica_id}"
      body: "replica_location"
    };
  }

  rpc DeleteReplicaLocation(DeleteReplicaLocationRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/api/v1/data-products/replicas/{replica_id}"
    };
  }
}

// Request/Response messages

message RegisterDataProductRequest {
  org.apache.airavata.model.data.replica.DataProductModel data_product = 1;
}

message RegisterDataProductResponse {
  string product_uri = 1;
}

message GetDataProductRequest {
  string product_uri = 1;
}

message RegisterReplicaLocationRequest {
  string product_uri = 1;
  org.apache.airavata.model.data.replica.DataReplicaLocationModel replica_location = 2;
}

message RegisterReplicaLocationResponse {
  string replica_id = 1;
}

message GetParentDataProductRequest {
  string product_uri = 1;
}

message GetChildDataProductsRequest {
  string product_uri = 1;
}

message GetChildDataProductsResponse {
  repeated org.apache.airavata.model.data.replica.DataProductModel data_products = 1;
}

message UpdateDataProductRequest {
  string product_uri = 1;
  org.apache.airavata.model.data.replica.DataProductModel data_product = 2;
}

message DeleteDataProductRequest {
  string product_uri = 1;
}

message GetReplicaLocationRequest {
  string replica_id = 1;
}

message UpdateReplicaLocationRequest {
  string replica_id = 1;
  org.apache.airavata.model.data.replica.DataReplicaLocationModel replica_location = 2;
}

message DeleteReplicaLocationRequest {
  string replica_id = 1;
}
