syntax = "proto3";

package org.apache.airavata.api.userprofile;

option java_package = "org.apache.airavata.api.userprofile";
option java_multiple_files = true;

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
import "org/apache/airavata/model/user/user_profile.proto";

// UserProfileService provides RPCs for user identity profile CRUD.
service UserProfileService {

  rpc AddUserProfile(AddUserProfileRequest) returns (AddUserProfileResponse) {
    option (google.api.http) = {
      post: "/api/v1/user-profiles"
      body: "user_profile"
    };
  }

  rpc UpdateUserProfile(UpdateUserProfileRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      put: "/api/v1/user-profiles/{user_profile.user_id}"
      body: "user_profile"
    };
  }

  rpc GetUserProfileById(GetUserProfileByIdRequest) returns (org.apache.airavata.model.user.UserProfile) {
    option (google.api.http) = {
      get: "/api/v1/user-profiles/{user_id}"
    };
  }

  rpc GetUserProfileByName(GetUserProfileByNameRequest) returns (org.apache.airavata.model.user.UserProfile) {
    option (google.api.http) = {
      get: "/api/v1/gateways/{gateway_id}/user-profiles:byName"
    };
  }

  rpc DeleteUserProfile(DeleteUserProfileRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/api/v1/user-profiles/{user_id}"
    };
  }

  rpc GetAllUserProfilesInGateway(GetAllUserProfilesInGatewayRequest) returns (GetAllUserProfilesInGatewayResponse) {
    option (google.api.http) = {
      get: "/api/v1/gateways/{gateway_id}/user-profiles"
    };
  }

  rpc DoesUserExist(DoesUserExistRequest) returns (DoesUserExistResponse) {
    option (google.api.http) = {
      get: "/api/v1/gateways/{gateway_id}/user-profiles/{user_name}:exists"
    };
  }
}

// Request/Response messages

message AddUserProfileRequest {
  org.apache.airavata.model.user.UserProfile user_profile = 1;
}

message AddUserProfileResponse {
  string user_id = 1;
}

message UpdateUserProfileRequest {
  org.apache.airavata.model.user.UserProfile user_profile = 1;
}

message GetUserProfileByIdRequest {
  string user_id = 1;
  string gateway_id = 2;
}

message GetUserProfileByNameRequest {
  string user_name = 1;
  string gateway_id = 2;
}

message DeleteUserProfileRequest {
  string user_id = 1;
}

message GetAllUserProfilesInGatewayRequest {
  string gateway_id = 1;
  int32 offset = 2;
  int32 limit = 3;
}

message GetAllUserProfilesInGatewayResponse {
  repeated org.apache.airavata.model.user.UserProfile user_profiles = 1;
}

message DoesUserExistRequest {
  string user_name = 1;
  string gateway_id = 2;
}

message DoesUserExistResponse {
  bool exists = 1;
}
