syntax = "proto3";

package org.apache.airavata.api.iam;

option java_package = "org.apache.airavata.api.iam";
option java_multiple_files = true;

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
import "org/apache/airavata/model/user/user_profile.proto";
import "org/apache/airavata/model/workspace/workspace.proto";

// IamAdminService provides RPCs for IAM administration (user management, roles, gateway setup).
service IamAdminService {

  rpc SetUpGateway(SetUpGatewayRequest) returns (org.apache.airavata.model.workspace.Gateway) {
    option (google.api.http) = {
      post: "/api/v1/iam/gateway"
      body: "gateway"
    };
  }

  rpc IsUsernameAvailable(IsUsernameAvailableRequest) returns (IsUsernameAvailableResponse) {
    option (google.api.http) = {
      get: "/api/v1/iam/users/{username}:available"
    };
  }

  rpc RegisterUser(RegisterUserRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/api/v1/iam/users"
      body: "*"
    };
  }

  rpc EnableUser(EnableUserRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/api/v1/iam/users/{username}:enable"
    };
  }

  rpc IsUserEnabled(IsUserEnabledRequest) returns (IsUserEnabledResponse) {
    option (google.api.http) = {
      get: "/api/v1/iam/users/{username}:enabled"
    };
  }

  rpc IsUserExist(IsUserExistRequest) returns (IsUserExistResponse) {
    option (google.api.http) = {
      get: "/api/v1/iam/users/{username}:exists"
    };
  }

  rpc GetUser(GetIamUserRequest) returns (org.apache.airavata.model.user.UserProfile) {
    option (google.api.http) = {
      get: "/api/v1/iam/users/{username}"
    };
  }

  rpc GetUsers(GetIamUsersRequest) returns (GetIamUsersResponse) {
    option (google.api.http) = {
      get: "/api/v1/iam/users"
    };
  }

  rpc ResetUserPassword(ResetUserPasswordRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/api/v1/iam/users/{username}:resetPassword"
      body: "*"
    };
  }

  rpc FindUsers(FindUsersRequest) returns (FindUsersResponse) {
    option (google.api.http) = {
      get: "/api/v1/iam/users:find"
    };
  }

  rpc UpdateUserProfile(UpdateIamUserProfileRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      put: "/api/v1/iam/users/{user_details.user_id}"
      body: "user_details"
    };
  }

  rpc DeleteUser(DeleteUserRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/api/v1/iam/users/{username}"
    };
  }

  rpc AddRoleToUser(AddRoleToUserRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/api/v1/iam/users/{username}/roles"
      body: "*"
    };
  }

  rpc RemoveRoleFromUser(RemoveRoleFromUserRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/api/v1/iam/users/{username}/roles/{role_name}"
    };
  }

  rpc GetUsersWithRole(GetUsersWithRoleRequest) returns (GetUsersWithRoleResponse) {
    option (google.api.http) = {
      get: "/api/v1/iam/roles/{role_name}/users"
    };
  }
}

// Request/Response messages

message SetUpGatewayRequest {
  org.apache.airavata.model.workspace.Gateway gateway = 1;
}

message IsUsernameAvailableRequest {
  string username = 1;
}

message IsUsernameAvailableResponse {
  bool available = 1;
}

message RegisterUserRequest {
  string username = 1;
  string email_address = 2;
  string first_name = 3;
  string last_name = 4;
  string new_password = 5;
}

message EnableUserRequest {
  string username = 1;
}

message IsUserEnabledRequest {
  string username = 1;
}

message IsUserEnabledResponse {
  bool enabled = 1;
}

message IsUserExistRequest {
  string username = 1;
}

message IsUserExistResponse {
  bool exists = 1;
}

message GetIamUserRequest {
  string username = 1;
}

message GetIamUsersRequest {
  int32 offset = 1;
  int32 limit = 2;
  string search = 3;
}

message GetIamUsersResponse {
  repeated org.apache.airavata.model.user.UserProfile users = 1;
}

message ResetUserPasswordRequest {
  string username = 1;
  string new_password = 2;
}

message FindUsersRequest {
  string email = 1;
  string user_id = 2;
}

message FindUsersResponse {
  repeated org.apache.airavata.model.user.UserProfile users = 1;
}

message UpdateIamUserProfileRequest {
  org.apache.airavata.model.user.UserProfile user_details = 1;
}

message DeleteUserRequest {
  string username = 1;
}

message AddRoleToUserRequest {
  string username = 1;
  string role_name = 2;
}

message RemoveRoleFromUserRequest {
  string username = 1;
  string role_name = 2;
}

message GetUsersWithRoleRequest {
  string role_name = 1;
}

message GetUsersWithRoleResponse {
  repeated org.apache.airavata.model.user.UserProfile users = 1;
}
