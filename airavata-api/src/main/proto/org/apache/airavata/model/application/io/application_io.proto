syntax = "proto3";

package org.apache.airavata.model.application.io;

option java_package = "org.apache.airavata.model.application.io.proto";
option java_multiple_files = true;

// Data Types supported in Airavata. The primitive data types.
enum DataType {
  DATA_TYPE_UNKNOWN = 0;
  STRING = 1;
  INTEGER = 2;
  FLOAT = 3;
  URI = 4;
  URI_COLLECTION = 5;
  STDOUT = 6;
  STDERR = 7;
}

// Application Inputs. The parameters describe how inputs are passed to the
// application.
//
// name: Name of the parameter.
// value: Value of the parameter. A default value could be set during registration.
// type: Data type of the parameter.
// application_argument: The argument flag sent to the application. Such as -p pressure.
// standard_input: When this value is set, the parameter is sent as standard input
//   rather than a parameter. Typically this is passed using redirection operator ">".
// user_friendly_description: Description to be displayed at the user interface.
// meta_data: Any metadata. This is typically ignored by Airavata and is used by
//   gateways for application configuration.
// override_filename: Rename input file to given value when staging to compute resource.
message InputDataObjectType {
  string name = 1;
  string value = 2;
  DataType type = 3;
  string application_argument = 4;
  bool standard_input = 5;
  string user_friendly_description = 6;
  string meta_data = 7;
  int32 input_order = 8;
  bool is_required = 9;
  bool required_to_added_to_command_line = 10;
  bool data_staged = 11;
  string storage_resource_id = 12;
  bool is_read_only = 13;
  string override_filename = 14;
}

// Application Outputs. The parameters describe how outputs are generated by
// the application.
//
// name: Name of the parameter.
// value: Value of the parameter.
// type: Data type of the parameter.
// application_argument: The argument flag sent to the application. Such as -p pressure.
// user_friendly_description: Description to be displayed at the user interface.
// meta_data: Any metadata. This is typically ignored by Airavata and is used by
//   gateways for application configuration.
message OutputDataObjectType {
  string name = 1;
  string value = 2;
  DataType type = 3;
  string application_argument = 4;
  bool is_required = 5;
  bool required_to_added_to_command_line = 6;
  bool data_movement = 7;
  string location = 8;
  string search_query = 9;
  bool output_streaming = 10;
  string storage_resource_id = 11;
  string meta_data = 12;
}
