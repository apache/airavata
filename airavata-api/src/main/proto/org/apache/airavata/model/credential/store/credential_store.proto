syntax = "proto3";

package org.apache.airavata.model.credential.store;

option java_package = "org.apache.airavata.model.credential.store.proto";
option java_multiple_files = true;

message SSHCredential {
  string gateway_id = 1;
  string username = 2;
  string passphrase = 3;
  string public_key = 4;
  string private_key = 5;
  int64 persisted_time = 6;
  string token = 7;
  string description = 8;
}

// Data Types supported in Airavata. The primitive data types.
enum SummaryType {
  SUMMARY_TYPE_UNKNOWN = 0;
  SSH = 1;
  PASSWD = 2;
  CERT = 3;
}

message CredentialSummary {
  SummaryType type = 1;
  string gateway_id = 2;
  // The username corresponds to the Credential's portalUserName which is the
  // username of the user that created the credential.
  string username = 3;
  string public_key = 4;
  int64 persisted_time = 5;
  string token = 6;
  string description = 7;
}

message CommunityUser {
  string gateway_name = 1;
  string username = 2;
  string user_email = 3;
}

message CertificateCredential {
  CommunityUser community_user = 1;
  string x509_cert = 2;
  string not_after = 3;
  string private_key = 4;
  int64 life_time = 5;
  string not_before = 6;
  int64 persisted_time = 7;
  string token = 8;
}

message PasswordCredential {
  string gateway_id = 1;
  string portal_user_name = 2;
  string login_user_name = 3;
  string password = 4;
  string description = 5;
  int64 persisted_time = 6;
  string token = 7;
}

// Wrapper used for persisting any credential type as a single BLOB.
message StoredCredential {
  oneof credential {
    SSHCredential ssh_credential = 1;
    PasswordCredential password_credential = 2;
    CertificateCredential certificate_credential = 3;
  }
}
