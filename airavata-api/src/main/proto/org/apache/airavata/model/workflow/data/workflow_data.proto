syntax = "proto3";

package org.apache.airavata.model;

option java_package = "org.apache.airavata.model.proto";
option java_multiple_files = true;

import "org/apache/airavata/model/application/io/application_io.proto";

enum WorkflowState {
  WORKFLOW_STATE_UNKNOWN = 0;
  CREATED = 1;
  STARTED = 2;
  EXECUTING = 3;
  COMPLETED = 4;
  FAILED = 5;
  CANCELLING = 6;
  CANCELED = 7;
}

enum ComponentState {
  COMPONENT_STATE_UNKNOWN = 0;
  COMPONENT_CREATED = 1;
  WAITING = 2;
  READY = 3;
  RUNNING = 4;
  COMPONENT_COMPLETED = 5;
  COMPONENT_FAILED = 6;
  COMPONENT_CANCELED = 7;
}

message ComponentStatus {
  ComponentState state = 1;
  string reason = 2;
  int64 timeof_state_change = 3;
}

message WorkflowStatus {
  WorkflowState state = 1;
  int64 time_of_state_change = 2;
  string reason = 3;
}

message WorkflowModel {
  string template_id = 1;
  string name = 2;
  string graph = 3;
  string gateway_id = 4;
  string created_user = 5;
  bytes image = 6;
  repeated org.apache.airavata.model.application.io.InputDataObjectType workflow_inputs = 7;
  repeated org.apache.airavata.model.application.io.OutputDataObjectType workflow_outputs = 8;
  int64 creation_time = 9;
}

message EdgeModel {
  string edge_id = 1;
  string name = 2;
  ComponentStatus status = 3;
  string description = 4;
}

message PortModel {
  string port_id = 1;
  string name = 2;
  ComponentStatus status = 3;
  string value = 4;
  string description = 5;
}

message NodeModel {
  string node_id = 1;
  string name = 2;
  string application_id = 3;
  string application_name = 4;
  ComponentStatus status = 5;
  string description = 6;
}
