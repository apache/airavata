# Spring Boot test configuration - reduce logging for cleaner test output
spring.main.banner-mode=off
spring.main.log-startup-info=false

# Reduce Spring Boot startup logging
logging.level.org.springframework.boot=WARN
logging.level.org.springframework.context=WARN
logging.level.org.springframework.test=WARN
logging.level.org.springframework.data=WARN
logging.level.org.springframework.orm=WARN
logging.level.org.springframework.transaction=WARN

# Reduce Hibernate logging
logging.level.org.hibernate=ERROR
logging.level.org.hibernate.orm=ERROR

# Reduce database connection pool logging
logging.level.com.zaxxer.hikari=WARN

# Reduce Airavata logging to WARN and above
logging.level.org.apache.airavata=WARN

# Keep test framework logs visible
logging.level.org.junit=INFO
logging.level.org.junit.jupiter=INFO
logging.level.org.junit.platform=INFO

