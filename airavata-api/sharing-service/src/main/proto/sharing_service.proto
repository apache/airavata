  repeated string child_ids = 2;
  string group_id = 3;
}

message RemoveChildGroupFromParentGroupRequest {
  string domain_id = 1;
  string child_id = 2;
  string group_id = 3;
}

message GetAllMemberGroupsForUserRequest {
  string domain_id = 1;
  string user_id = 2;
}

message GetAllMemberGroupsForUserResponse {
  repeated org.apache.airavata.sharing.registry.models.UserGroup groups = 1;
}

