}

message UpdateUserRequest {
  org.apache.airavata.sharing.registry.models.User user = 1;
}

message IsUserExistsRequest {
  string domain_id = 1;
  string user_id = 2;
}

message IsUserExistsResponse {
  bool exists = 1;
}

message DeleteUserRequest {
  string domain_id = 1;
  string user_id = 2;
}

message GetUserRequest {
  string domain_id = 1;
  string user_id = 2;
}

message GetUsersRequest {
  string domain_id = 1;
  int32 offset = 2;
  int32 limit = 3;
}

message GetUsersResponse {
  repeated org.apache.airavata.sharing.registry.models.User users = 1;
}

// ===========================================================================
// Request/Response messages — Group CRUD
// ===========================================================================

message CreateGroupRequest {
  org.apache.airavata.sharing.registry.models.UserGroup group = 1;
}

message CreateGroupResponse {
  string group_id = 1;
}

message UpdateGroupRequest {
  org.apache.airavata.sharing.registry.models.UserGroup group = 1;
}

message IsGroupExistsRequest {
  string domain_id = 1;
  string group_id = 2;
}

message IsGroupExistsResponse {
  bool exists = 1;
}

message DeleteGroupRequest {
  string domain_id = 1;
  string group_id = 2;
}

message GetGroupRequest {
  string domain_id = 1;
  string group_id = 2;
}

message GetGroupsRequest {
  string domain_id = 1;
  int32 offset = 2;
  int32 limit = 3;
}

message GetGroupsResponse {
