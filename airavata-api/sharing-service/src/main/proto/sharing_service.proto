// ===========================================================================
// Request/Response messages — Permission type CRUD
// ===========================================================================

message CreatePermissionTypeRequest {
  org.apache.airavata.sharing.registry.models.PermissionType permission_type = 1;
}

message CreatePermissionTypeResponse {
  string permission_type_id = 1;
}

message UpdatePermissionTypeRequest {
  org.apache.airavata.sharing.registry.models.PermissionType permission_type = 1;
}

message IsPermissionExistsRequest {
  string domain_id = 1;
  string permission_id = 2;
}

message IsPermissionExistsResponse {
  bool exists = 1;
}

message DeletePermissionTypeRequest {
  string domain_id = 1;
  string permission_type_id = 2;
}

message GetPermissionTypeRequest {
  string domain_id = 1;
  string permission_type_id = 2;
}

message GetPermissionTypesRequest {
  string domain_id = 1;
  int32 offset = 2;
  int32 limit = 3;
}

message GetPermissionTypesResponse {
  repeated org.apache.airavata.sharing.registry.models.PermissionType permission_types = 1;
}

// ===========================================================================
// Request/Response messages — Entity sharing (Thrift-compatible)
// ===========================================================================

message ShareEntityWithUsersRequest {
  string domain_id = 1;
  string entity_id = 2;
  repeated string user_list = 3;
  string permission_type_id = 4;
  bool cascade_permission = 5;
}

message RevokeEntitySharingFromUsersRequest {
  string domain_id = 1;
  string entity_id = 2;
  repeated string user_list = 3;
  string permission_type_id = 4;
}

message ShareEntityWithGroupsRequest {
  string domain_id = 1;
  string entity_id = 2;
  repeated string group_list = 3;
  string permission_type_id = 4;
  bool cascade_permission = 5;
}

message RevokeEntitySharingFromGroupsRequest {
  string domain_id = 1;
  string entity_id = 2;
  repeated string group_list = 3;
  string permission_type_id = 4;
}
