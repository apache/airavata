syntax = "proto3";

package org.apache.airavata.api.resource;

option java_package = "org.apache.airavata.api.resource";
option java_multiple_files = true;

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
import "org/apache/airavata/model/appcatalog/computeresource/compute_resource.proto";
import "org/apache/airavata/model/appcatalog/storageresource/storage_resource.proto";

// ResourceService provides RPCs for managing compute resources, storage resources,
// and batch queues. Transport is always SSH (compute) / SFTP (storage), read off the resource.
service ResourceService {

  // --- Compute Resources ---

  rpc RegisterComputeResource(RegisterComputeResourceRequest) returns (RegisterComputeResourceResponse) {
    option (google.api.http) = {
      post: "/api/v1/compute-resources"
      body: "compute_resource"
    };
  }

  rpc GetComputeResource(GetComputeResourceRequest) returns (org.apache.airavata.model.appcatalog.computeresource.ComputeResourceDescription) {
    option (google.api.http) = {
      get: "/api/v1/compute-resources/{compute_resource_id}"
    };
  }

  rpc UpdateComputeResource(UpdateComputeResourceRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      put: "/api/v1/compute-resources/{compute_resource_id}"
      body: "compute_resource"
    };
  }

  rpc DeleteComputeResource(DeleteComputeResourceRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/api/v1/compute-resources/{compute_resource_id}"
    };
  }

  rpc GetAllComputeResourceNames(GetAllComputeResourceNamesRequest) returns (GetAllComputeResourceNamesResponse) {
    option (google.api.http) = {
      get: "/api/v1/compute-resources:names"
    };
  }

  // --- Storage Resources ---

  rpc RegisterStorageResource(RegisterStorageResourceRequest) returns (RegisterStorageResourceResponse) {
    option (google.api.http) = {
      post: "/api/v1/storage-resources"
      body: "storage_resource"
    };
  }

  rpc GetStorageResource(GetStorageResourceRequest) returns (org.apache.airavata.model.appcatalog.storageresource.StorageResourceDescription) {
    option (google.api.http) = {
      get: "/api/v1/storage-resources/{storage_resource_id}"
    };
  }

  rpc UpdateStorageResource(UpdateStorageResourceRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      put: "/api/v1/storage-resources/{storage_resource_id}"
      body: "storage_resource"
    };
  }

  rpc DeleteStorageResource(DeleteStorageResourceRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/api/v1/storage-resources/{storage_resource_id}"
    };
  }

  rpc GetAllStorageResourceNames(GetAllStorageResourceNamesRequest) returns (GetAllStorageResourceNamesResponse) {
    option (google.api.http) = {
      get: "/api/v1/storage-resources:names"
    };
  }

  // --- Batch Queue ---

  rpc DeleteBatchQueue(DeleteBatchQueueRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/api/v1/compute-resources/{compute_resource_id}/batch-queues/{queue_name}"
    };
  }
}

// --- Compute Resource Request/Response messages ---

message RegisterComputeResourceRequest {
  org.apache.airavata.model.appcatalog.computeresource.ComputeResourceDescription compute_resource = 1;
}

message RegisterComputeResourceResponse {
  string compute_resource_id = 1;
}

message GetComputeResourceRequest {
  string compute_resource_id = 1;
}

message UpdateComputeResourceRequest {
  string compute_resource_id = 1;
  org.apache.airavata.model.appcatalog.computeresource.ComputeResourceDescription compute_resource = 2;
}

message DeleteComputeResourceRequest {
  string compute_resource_id = 1;
}

message GetAllComputeResourceNamesRequest {}

message GetAllComputeResourceNamesResponse {
  map<string, string> compute_resource_names = 1;
}

// --- Storage Resource Request/Response messages ---

message RegisterStorageResourceRequest {
  org.apache.airavata.model.appcatalog.storageresource.StorageResourceDescription storage_resource = 1;
}

message RegisterStorageResourceResponse {
  string storage_resource_id = 1;
}

message GetStorageResourceRequest {
  string storage_resource_id = 1;
}

message UpdateStorageResourceRequest {
  string storage_resource_id = 1;
  org.apache.airavata.model.appcatalog.storageresource.StorageResourceDescription storage_resource = 2;
}

message DeleteStorageResourceRequest {
  string storage_resource_id = 1;
}

message GetAllStorageResourceNamesRequest {}

message GetAllStorageResourceNamesResponse {
  map<string, string> storage_resource_names = 1;
}

// --- Batch Queue Request/Response messages ---

message DeleteBatchQueueRequest {
  string compute_resource_id = 1;
  string queue_name = 2;
}
