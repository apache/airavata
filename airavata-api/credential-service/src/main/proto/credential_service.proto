syntax = "proto3";

package org.apache.airavata.api.credential;

option java_package = "org.apache.airavata.api.credential";
option java_multiple_files = true;

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
import "org/apache/airavata/model/credential/store/credential_store.proto";

// CredentialService provides RPCs for managing SSH keys, password credentials,
// and SSH account setup on compute resources.
service CredentialService {

  rpc GenerateAndRegisterSSHKeys(GenerateAndRegisterSSHKeysRequest) returns (GenerateAndRegisterSSHKeysResponse) {
    option (google.api.http) = {
      post: "/api/v1/credentials/ssh-keys"
      body: "*"
    };
  }

  rpc RegisterPwdCredential(RegisterPwdCredentialRequest) returns (RegisterPwdCredentialResponse) {
    option (google.api.http) = {
      post: "/api/v1/credentials/passwords"
      body: "*"
    };
  }

  rpc GetCredentialSummary(GetCredentialSummaryRequest) returns (org.apache.airavata.model.credential.store.CredentialSummary) {
    option (google.api.http) = {
      get: "/api/v1/credentials/{token_id}"
    };
  }

  rpc GetAllCredentialSummaries(GetAllCredentialSummariesRequest) returns (GetAllCredentialSummariesResponse) {
    option (google.api.http) = {
      get: "/api/v1/credentials"
    };
  }

  rpc DeleteSSHPubKey(DeleteSSHPubKeyRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/api/v1/credentials/ssh-keys/{token_id}"
    };
  }

  rpc DeletePWDCredential(DeletePWDCredentialRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/api/v1/credentials/passwords/{token_id}"
    };
  }

  rpc DoesUserHaveSSHAccount(DoesUserHaveSSHAccountRequest) returns (DoesUserHaveSSHAccountResponse) {
    option (google.api.http) = {
      get: "/api/v1/credentials/ssh-accounts/{compute_resource_id}:check"
    };
  }

  rpc IsSSHSetupComplete(IsSSHSetupCompleteRequest) returns (IsSSHSetupCompleteResponse) {
    option (google.api.http) = {
      get: "/api/v1/credentials/ssh-accounts/{compute_resource_id}:setup-status"
    };
  }

  rpc SetupSSHAccount(SetupSSHAccountRequest) returns (SetupSSHAccountResponse) {
    option (google.api.http) = {
      post: "/api/v1/credentials/ssh-accounts/{compute_resource_id}:setup"
      body: "*"
    };
  }
}

// Request/Response messages

message GenerateAndRegisterSSHKeysRequest {
  string gateway_id = 1;
  string username = 2;
  string description = 3;
}

message GenerateAndRegisterSSHKeysResponse {
  string token = 1;
}

message RegisterPwdCredentialRequest {
  string gateway_id = 1;
  org.apache.airavata.model.credential.store.PasswordCredential password_credential = 2;
}

message RegisterPwdCredentialResponse {
  string token = 1;
}

message GetCredentialSummaryRequest {
  string token_id = 1;
  string gateway_id = 2;
}

message GetAllCredentialSummariesRequest {
  string gateway_id = 1;
  org.apache.airavata.model.credential.store.SummaryType type = 2;
}

message GetAllCredentialSummariesResponse {
  repeated org.apache.airavata.model.credential.store.CredentialSummary credential_summaries = 1;
}

message DeleteSSHPubKeyRequest {
  string token_id = 1;
  string gateway_id = 2;
}

message DeletePWDCredentialRequest {
  string token_id = 1;
  string gateway_id = 2;
}

message DoesUserHaveSSHAccountRequest {
  string compute_resource_id = 1;
  string gateway_id = 2;
  string username = 3;
}

message DoesUserHaveSSHAccountResponse {
  bool has_account = 1;
}

message IsSSHSetupCompleteRequest {
  string compute_resource_id = 1;
  string gateway_id = 2;
  string username = 3;
}

message IsSSHSetupCompleteResponse {
  bool is_complete = 1;
}

message SetupSSHAccountRequest {
  string compute_resource_id = 1;
  string gateway_id = 2;
  string username = 3;
}

message SetupSSHAccountResponse {
  bool success = 1;
}
