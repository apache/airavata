research.grpc.server.port=19908

research.server.port=18889
research.server.address=0.0.0.0

airavata.research-hub.url=http://localhost:20000
airavata.research-hub.adminApiKey=JUPYTER_ADMIN_API_KEY
airavata.research-hub.limit=10
airavata.research-portal.url=http://localhost:5173
airavata.research-portal.dev-url=http://localhost:5173
airavata.openid.url=http://localhost:18080/realms/default

research.spring.servlet.multipart.max-file-size=200MB
research.spring.servlet.multipart.max-request-size=200MB
research.spring.datasource.url=jdbc:mariadb://localhost:13306/research_catalog
research.spring.datasource.username=airavata
research.spring.datasource.password=123456
research.spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
research.spring.datasource.hikari.pool-name=ResearchCatalogPool
research.spring.datasource.hikari.leak-detection-threshold=20000
research.spring.jpa.hibernate.ddl-auto=validate
research.spring.jpa.open-in-view=false

research.springdoc.api-docs.enabled=true
research.springdoc.swagger-ui.path=/swagger-ui.html
research.springdoc.swagger-ui.operationsSorter=alpha
research.springdoc.swagger-ui.tagsSorter=alpha
research.springdoc.swagger-ui.doc-expansion=none
research.springdoc.swagger-ui.oauth.use-pkce-with-authorization-code-grant=true
research.springdoc.swagger-ui.oauth.client-id=data-catalog-portal
