# ============================================================================
# AIRAVATA PROPERTIES CONFIGURATION
# ============================================================================
#
# This is the central configuration file for all Airavata services.
#
# PROPERTY NAMING CONVENTION:
#   - Use hierarchical dot notation with kebab-case segments
#   - Format: {category}.{service}.{property} or {category}.{subcategory}.{property}
#   - Examples: database.registry.url, services.rest.enabled, security.iam.server-url
#
# SECTION ORGANIZATION:
#   Properties are organized into logical sections and sorted alphabetically
#   within each section for maintainability.
#
# SERVICE SCOPING:
#   - Database properties: database.{service}.{property}
#   - Service properties: services.{service}.{property}
#   - Security properties: security.{component}.{property}
#   - Messaging properties: {messaging-system}.{property}
#
# ADDING NEW PROPERTIES:
#   1. Determine the appropriate section and service scope
#   2. Add the property in alphabetical order within its section
#   3. Use consistent naming with existing properties
#   4. Document the property with a comment if needed
#
# ============================================================================

# ==================== Core Configuration ====================
# Core Airavata configuration properties

# Airavata home directory. If not set, will fall back to AIRAVATA_HOME environment variable.
# Config directory is always {airavata.home}/conf
